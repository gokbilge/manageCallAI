services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-managecallai}
      POSTGRES_USER: ${POSTGRES_USER:-managecallai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-managecallai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: node:22
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "corepack enable && CI=true pnpm install --frozen-lockfile && pnpm --filter @managecallai/api build && node apps/api/dist/server.js",
      ]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-managecallai}:${POSTGRES_PASSWORD:-managecallai}@postgres:5432/${POSTGRES_DB:-managecallai}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
      SIP_SECRET_MASTER_KEY: ${SIP_SECRET_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      SIP_SECRET_KEY_ID: ${SIP_SECRET_KEY_ID:-v1}
      CI: "true"
    volumes:
      - ./:/workspace
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgres

  freeswitch:
    build:
      context: ./freeswitch
      dockerfile: docker/Dockerfile
      args:
        FREESWITCH_VERSION: ${FREESWITCH_VERSION:-v1.10.12}
    environment:
      MANAGECALLAI_DIRECTORY_URL: ${MANAGECALLAI_DIRECTORY_URL:-http://api:3000/api/v1/freeswitch/directory}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD:-ClueCon}
    ports:
      - "5060:5060/udp"
      - "5080:5080/tcp"
      - "5080:5080/udp"
      - "8021:8021/tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

volumes:
  postgres_data:
