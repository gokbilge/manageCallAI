services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-managecallai}
      POSTGRES_USER: ${POSTGRES_USER:-managecallai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-managecallai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: node:22
    working_dir: /workspace
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm --filter @managecallai/api dev"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-managecallai}:${POSTGRES_PASSWORD:-managecallai}@postgres:5432/${POSTGRES_DB:-managecallai}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
    volumes:
      - ./:/workspace
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - postgres

  freeswitch:
    image: signalwire/freeswitch:latest
    ports:
      - "5060:5060/udp"
      - "5080:5080/tcp"
      - "8021:8021/tcp"
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
      - ./freeswitch/lua:/usr/share/freeswitch/scripts

volumes:
  postgres_data:
