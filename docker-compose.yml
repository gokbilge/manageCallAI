services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-managecallai}
      POSTGRES_USER: ${POSTGRES_USER:-managecallai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-managecallai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-managecallai} -d ${POSTGRES_DB:-managecallai}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: managecallai-api:local
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-managecallai}:${POSTGRES_PASSWORD:-managecallai}@postgres:5432/${POSTGRES_DB:-managecallai}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
      SIP_SECRET_MASTER_KEY: ${SIP_SECRET_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      SIP_SECRET_KEY_ID: ${SIP_SECRET_KEY_ID:-v1}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on:
      postgres:
        condition: service_healthy

  freeswitch:
    profiles: [freeswitch]
    build:
      context: ./freeswitch
      dockerfile: docker/Dockerfile
      args:
        FREESWITCH_VERSION: ${FREESWITCH_VERSION:-v1.10.12}
    environment:
      MANAGECALLAI_DIRECTORY_URL: ${MANAGECALLAI_DIRECTORY_URL:-http://api:3000/api/v1/freeswitch/directory}
      MANAGECALLAI_API_BASE: ${MANAGECALLAI_API_BASE:-http://api:3000/api/v1}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD:-ClueCon}
    ports:
      - "5060:5060/udp"
      - "5080:5080/tcp"
      - "5080:5080/udp"
      - "8021:8021/tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

  freeswitch-agent:
    profiles: [freeswitch]
    build:
      context: .
      dockerfile: apps/freeswitch-agent/Dockerfile
    image: managecallai-freeswitch-agent:local
    environment:
      FREESWITCH_ESL_HOST: freeswitch
      FREESWITCH_ESL_PORT: 8021
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD:-ClueCon}
      API_BASE_URL: http://api:3000
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN:-change-me-runtime-token}
      MANAGECALLAI_TENANT_ID: ${MANAGECALLAI_TENANT_ID:-}
      LOG_LEVEL: ${FREESWITCH_AGENT_LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_healthy
      freeswitch:
        condition: service_started

volumes:
  postgres_data:
