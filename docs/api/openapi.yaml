              schema:
                $ref: '#/components/schemas/IvrFlowSimulationResponse'
        '422':
          description: Simulation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowSimulationResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions/{versionId}/simulate:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [IvrFlows]
      summary: Simulate specific flow version
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IvrFlowSimulationRequest'
      responses:
        '200':
          description: Simulation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowSimulationResponse'
        '422':
          description: Simulation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowSimulationResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions/{versionId}/publish:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [IvrFlows]
      summary: Publish validated or simulated flow version
      responses:
        '200':
          description: Flow published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowPublishResponse'
        '202':
          description: Publish is pending approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowPublishResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/rollback:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [IvrFlows]
      summary: Roll back to previous published version
      responses:
        '200':
          description: Flow rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowPublishResponse'
        '202':
          description: Rollback is pending approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowPublishResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/history:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    get:
      tags: [IvrFlows]
      summary: Get IVR flow validation, simulation, publish, and audit history
      responses:
        '200':
          description: IVR flow history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowHistoryResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /runtime/ivr/sessions:
    get:
      tags: [Runtime]
      summary: List IVR runtime sessions for the authenticated tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [running, completed, failed]
      responses:
        '200':
          description: Runtime session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrRuntimeSessionListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Runtime]
      summary: Start an IVR runtime session
      description: |
        Runtime-internal endpoint. Pins the current published flow version and
        resolves the first constrained runtime action.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartIvrRuntimeSessionRequest'
      responses:
        '201':
          description: Runtime session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrRuntimeSessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /runtime/ivr/sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/SessionIdParam'
    get:
      tags: [Runtime]
      summary: Get IVR runtime session replay for the authenticated tenant
      responses:
        '200':
          description: Runtime session replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrRuntimeSessionReplayResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /runtime/ivr/sessions/{sessionId}/advance:
    parameters:
      - $ref: '#/components/parameters/SessionIdParam'
    post:
      tags: [Runtime]
      summary: Advance an IVR runtime session
      description: |
        Runtime-internal endpoint. Accepts the result of the current action and
        resolves the next constrained runtime action, if any.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceIvrRuntimeSessionRequest'
      responses:
        '200':
          description: Runtime session advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrRuntimeSessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /call-events:
    get:
      tags: [CallEvents]
      summary: List call events for the authenticated tenant
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Must match the tenant_id in the JWT. Ignored if different.
      responses:
        '200':
          description: Call event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEventListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /call-events/internal/ingest:
    post:
      tags: [CallEvents]
      summary: Ingest a call event from the runtime agent
      description: |
        **Runtime-internal endpoint.** Called by the Go FreeSWITCH ESL agent.
        Requires runtime token auth, not a user JWT.
        Header: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or: `x-managecallai-runtime-token: <RUNTIME_API_TOKEN>`
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestCallEventRequest'
      responses:
        '201':
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEventResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /platform/tenants:
    get:
      tags: [Platform]
      summary: List all tenants (platform_admin only)
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /platform/runtime/health:
    get:
      tags: [Platform]
      summary: Runtime health summary (platform_admin only)
      responses:
        '200':
          description: Runtime health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /platform/runtime/summary:
    get:
      tags: [Platform]
      summary: Runtime summary counters (platform_admin only)
      responses:
        '200':
          description: Runtime summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRuntimeSummaryResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /freeswitch/directory:
    get:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML directory lookup
      description: |
        **Runtime-internal endpoint.** Called by FreeSWITCH `mod_xml_curl` for
        SIP registration and authentication. Returns FreeSWITCH XML.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or query param `runtime_token=<token>` (local/dev compatibility only).
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: user
          in: query
          schema:
            type: string
          description: SIP username (extension number)
        - name: domain
          in: query
          schema:
            type: string
          description: SIP domain
        - name: runtime_token
          in: query
          schema:
            type: string
          description: Dev-only token fallback. Prefer Authorization header.
      responses:
        '200':
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string
        '404':
          description: User not found — FreeSWITCH XML with empty groups
          content:
            text/xml:
              schema:
                type: string
    post:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML directory lookup (POST form)
      description: |
        Same as GET /freeswitch/directory but accepts form-encoded body
        as sent by some FreeSWITCH `mod_xml_curl` configurations.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                user:
                  type: string
                domain:
                  type: string
                runtime_token:
                  type: string
      responses:
        '200':
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string

  /freeswitch/route-lookup:
    get:
      tags: [FreeSWITCH]
      summary: Resolve an inbound DID to a route target
      description: |
        **Runtime-internal endpoint.** Called by the FreeSWITCH Lua inbound
        script (`inbound_route.lua`) on every inbound call.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or header `x-managecallai-runtime-token: <token>`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: did
          in: query
          required: true
          schema:
            type: string
          description: E.164 DID to resolve (URL-encoded, e.g. %2B15551234567)
        - name: trunk
          in: query
          schema:
            type: string
          description: Trunk name for trunk-match routing (optional)
      responses:
        '200':
          description: Route resolved or not matched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteLookupResponse'
        '400':
          description: Missing did parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /freeswitch/dialplan:
    get:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML dialplan projection for inbound DID routing
      description: |
        **Runtime-internal endpoint.** Called by FreeSWITCH `mod_xml_curl` for
        inbound DID routing. Returns FreeSWITCH XML dialplan for active inbound
        routes that currently resolve to an `extension` target.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or `x-managecallai-runtime-token: <token>`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: Caller-Destination-Number
          in: query
          schema:
            type: string
          description: Inbound DID in E.164 form
        - name: destination_number
          in: query
          schema:
            type: string
          description: Alternate FreeSWITCH destination field
        - name: domain
          in: query
          schema:
            type: string
          description: Tenant directory domain
        - name: domain_name
          in: query
          schema:
            type: string
          description: Alternate tenant domain field
        - name: runtime_token
          in: query
          schema:
            type: string
          description: Dev-only token fallback. Prefer Authorization header.
      responses:
        '200':
          description: FreeSWITCH XML dialplan response
          content:
            text/xml:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML dialplan projection (POST form)
      description: |
        Same as GET /freeswitch/dialplan but accepts form-encoded body as sent
        by `mod_xml_curl`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Caller-Destination-Number:
                  type: string
                destination_number:
                  type: string
                domain:
                  type: string
                domain_name:
                  type: string
                runtime_token:
                  type: string
      responses:
        '200':
          description: FreeSWITCH XML dialplan response
          content:
            text/xml:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User JWT issued by /auth/login or /auth/register
    runtimeTokenBearer:
      type: http
      scheme: bearer
      description: RUNTIME_API_TOKEN as Bearer token (preferred)
    runtimeTokenHeader:
      type: apiKey
      in: header
      name: x-managecallai-runtime-token
      description: RUNTIME_API_TOKEN as custom header

  parameters:
    ExtensionIdParam:
      name: extensionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TrunkIdParam:
      name: trunkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NumberIdParam:
      name: numberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PromptIdParam:
      name: promptId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QueueIdParam:
      name: queueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VoicemailBoxIdParam:
      name: boxId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RouteIdParam:
      name: routeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FlowIdParam:
      name: flowId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionIdParam:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [tenant_name, tenant_slug, email, display_name, password]
      properties:
        tenant_name:
          type: string
          minLength: 1
          maxLength: 100
        tenant_slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
          writeOnly: true

    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
        email:
          type: string
        password:
          type: string
          writeOnly: true

    AuthResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: >
            Signed JWT. Claims include sub, tenant_id, email, role
            ('tenant_admin' | 'platform_admin').

    # ── Extensions ────────────────────────────────────────────────────────────

    Extension:
      type: object
      required: [id, tenant_id, extension_number, display_name, status, sip_username, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        extension_number:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [active, inactive]

    PromptAsset:
      type: object
      required: [id, tenant_id, name, media_type, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        media_type:
          type: string
        language:
          type: string
          nullable: true
        storage_uri:
          type: string
          nullable: true
        checksum:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PromptAssetResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PromptAsset'

    PromptAssetListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PromptAsset'

    CreatePromptAssetRequest:
      type: object
      required: [name, media_type, storage_uri]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        media_type:
          type: string
          minLength: 1
          maxLength: 255
        language:
          type: string
          minLength: 1
          maxLength: 32
        storage_uri:
          type: string
          minLength: 1
          maxLength: 2048
        checksum:
          type: string
          minLength: 1
          maxLength: 255

    UpdatePromptAssetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        media_type:
          type: string
          minLength: 1
          maxLength: 255
        language:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 32
            - type: 'null'
        storage_uri:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 2048
            - type: 'null'
        checksum:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 255
            - type: 'null'
        status:
          type: string
          enum: [active, inactive]
        sip_username:
          type: string
        default_destination_type:
          type: string
          nullable: true
          enum: [flow, extension, user, queue, null]
        default_destination_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ExtensionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Extension'

    ExtensionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Extension'

    CreateExtensionRequest:
      type: object
      required: [extension_number, display_name, sip_password]
      properties:
        extension_number:
          type: string
          minLength: 1
          maxLength: 20
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        sip_username:
          type: string
          minLength: 1
          maxLength: 64
          description: Defaults to extension_number when omitted
        sip_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
          description: >
            Plaintext SIP password. Encrypted with AES-256-GCM before storage.
            Never returned in any API response.
        default_destination_type:
          type: string
          enum: [flow, extension, user, queue]
        default_destination_id:
          type: string
          format: uuid

    UpdateExtensionRequest:
      type: object
      properties:
        extension_number:
          type: string
          minLength: 1
          maxLength: 20
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          type: string
          enum: [active, inactive]
        sip_username:
          type: string
          minLength: 1
          maxLength: 64
        sip_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
        default_destination_type:
          oneOf:
            - type: string
              enum: [flow, extension, user, queue]
            - type: 'null'
        default_destination_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    # ── SIP Trunks ────────────────────────────────────────────────────────────

    SipTrunk:
      type: object
      required: [id, tenant_id, name, status, direction, realm, proxy, port, transport, auth_username, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          type: string
          nullable: true
        auth_username:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SipTrunkResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SipTrunk'

    SipTrunkListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SipTrunk'

    CreateSipTrunkRequest:
      type: object
      required: [name, direction, realm, proxy, auth_username, auth_password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          type: string
        auth_username:
          type: string
        auth_password:
          type: string
          writeOnly: true
          minLength: 8
          description: >
            Plaintext SIP trunk auth password. Encrypted with AES-256-GCM before
            storage. Never returned in API responses.

    UpdateSipTrunkRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          oneOf:
            - type: string
            - type: 'null'
        auth_username:
          type: string
        auth_password:
          type: string
          writeOnly: true
          minLength: 8

    # ── Phone Numbers ─────────────────────────────────────────────────────────

    PhoneNumber:
      type: object
      required: [id, tenant_id, e164_number, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        e164_number:
          type: string
          description: E.164-formatted number, e.g. +15551234567
        display_label:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        trunk_id:
          type: string
          nullable: true
          format: uuid
        assigned_target_type:
          type: string
          nullable: true
          enum: [inbound_route, flow, extension, null]
        assigned_target_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PhoneNumberResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PhoneNumber'

    PhoneNumberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumber'

    CreatePhoneNumberRequest:
      type: object
      required: [e164_number]
      properties:
        e164_number:
          type: string
          minLength: 2
          maxLength: 32
        display_label:
          type: string
          minLength: 1
          maxLength: 255
        trunk_id:
          type: string
          format: uuid

    UpdatePhoneNumberRequest:
      type: object
      properties:
        display_label:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 255
            - type: 'null'
        trunk_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        assigned_target_type:
          oneOf:
            - type: string
              enum: [inbound_route, flow, extension]
            - type: 'null'
        assigned_target_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        status:
          type: string
          enum: [active, inactive]

    # ── Inbound Routes ────────────────────────────────────────────────────────

    QueueMember:
      type: object
      required: [id, queue_id, tenant_id, extension_id, extension_number, display_name, position, created_at]
      properties:
        id:
          type: string
          format: uuid
        queue_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        extension_id:
          type: string
          format: uuid
        extension_number:
          type: string
        display_name:
          type: string
        position:
          type: integer
        created_at:
          type: string
          format: date-time

    Queue:
      type: object
      required: [id, tenant_id, name, strategy, ring_timeout_seconds, status, members, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        strategy:
          type: string
          enum: [simultaneous, sequential]
        ring_timeout_seconds:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        members:
          type: array
          items:
            $ref: '#/components/schemas/QueueMember'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    QueueResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Queue'

    QueueListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Queue'

    QueueMemberResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/QueueMember'

    CreateQueueRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        strategy:
          type: string
          enum: [simultaneous, sequential]
        ring_timeout_seconds:
          type: integer
          minimum: 5
          maximum: 120

    UpdateQueueRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          oneOf:
            - type: string
              maxLength: 1000
            - type: 'null'
        strategy:
          type: string
          enum: [simultaneous, sequential]
        ring_timeout_seconds:
          type: integer
          minimum: 5
          maximum: 120
        status:
          type: string
          enum: [active, inactive]

    AddQueueMemberRequest:
      type: object
      required: [extension_id]
      properties:
        extension_id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 0

    VoicemailBox:
      type: object
      required: [id, tenant_id, name, mailbox_number, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        mailbox_number:
          type: string
        greeting_prompt_id:
          type: string
          format: uuid
          nullable: true
        greeting_prompt_name:
          type: string
          nullable: true
        greeting_prompt_uri:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VoicemailBoxResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/VoicemailBox'

    VoicemailBoxListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VoicemailBox'

    CreateVoicemailBoxRequest:
      type: object
      required: [name, mailbox_number]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        mailbox_number:
          type: string
          pattern: '^[0-9]{2,12}$'
        greeting_prompt_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    UpdateVoicemailBoxRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          oneOf:
            - type: string
              maxLength: 1000
            - type: 'null'
        mailbox_number:
          type: string
          pattern: '^[0-9]{2,12}$'
        greeting_prompt_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        status:
          type: string
          enum: [active, inactive]

    InboundRoute:
      type: object
      required: [id, tenant_id, name, match_type, match_value, target_type, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
        phone_number_id:
          type: string
          nullable: true
          format: uuid
        target_type:
          type: string
          enum: [flow, extension, call_group, queue, voicemail_box]
        target_id:
          type: string
          nullable: true
          format: uuid
        status:
          type: string
          enum: [draft, active, inactive]
        draft_version_id:
          type: string
          nullable: true
          format: uuid
        active_version_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InboundRouteResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/InboundRoute'

    InboundRouteListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InboundRoute'

    CreateInboundRouteRequest:
      type: object
      required: [name, match_type, match_value, target_type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
          minLength: 1
          maxLength: 255
        phone_number_id:
          type: string
          format: uuid
          description: >
            Optional. When supplied, match_type must be 'did' and match_value
            is normalized from the linked phone number's e164_number.
        target_type:
          type: string
          enum: [flow, extension, call_group, queue, voicemail_box]
        target_id:
          type: string
          format: uuid

    UpdateInboundRouteRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
          minLength: 1
          maxLength: 255
        phone_number_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        target_type:
          type: string
          enum: [flow, extension, call_group, queue, voicemail_box]
        target_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    RouteVersion:
      type: object
      required: [id, route_id, version_number, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        route_id:
          type: string
          format: uuid
        version_number:
          type: integer
        state:
          type: string
          enum: [draft, validated, published, superseded, rolled_back]
        definition:
          type: object
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    RouteVersionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/RouteVersion'

    ValidationResult:
      type: object
      required: [outcome]
      properties:
        outcome:
          $ref: '#/components/schemas/ValidationOutcome'

    ValidationOutcome:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [passed, failed]
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true

    ValidationResultResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ValidationResult'

    # ── IVR Flows ─────────────────────────────────────────────────────────────

    IvrFlow:
      type: object
      required: [id, tenant_id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, inactive]
        draft_version_id:
          type: string
          nullable: true
          format: uuid
        active_version_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IvrFlowResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlow'

    IvrFlowWithVersions:
      allOf:
        - $ref: '#/components/schemas/IvrFlow'
        - type: object
          required: [versions]
          properties:
            versions:
              type: array
              items:
                $ref: '#/components/schemas/FlowVersion'

    IvrFlowDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlowWithVersions'

    IvrFlowListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IvrFlow'

    CreateIvrFlowRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        graph_json:
          type: object
          description: Draft graph schema for the first version.
        definition:
          type: object
          description: Compatibility alias for graph_json.

    UpdateIvrFlowRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          oneOf:
            - type: string
              maxLength: 1000
            - type: 'null'
        status:
          type: string
          enum: [draft, active, inactive]

    FlowVersionDraftRequest:
      type: object
      properties:
        graph_json:
          type: object
        definition:
          type: object
          description: Compatibility alias for graph_json.

    FlowVersion:
      type: object
      required: [id, flow_id, version_number, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        flow_id:
          type: string
          format: uuid
        version_number:
          type: integer
        state:
          type: string
          enum: [draft, validated, simulated, published, superseded, rolled_back]
        graph_json:
          type: object
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        validated_at:
          type: string
          format: date-time
          nullable: true
        simulated_at:
          type: string
          format: date-time
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true

    FlowVersionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/FlowVersion'

    FlowVersionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FlowVersion'

    IvrFlowValidationResult:
      type: object
      required: [version, outcome]
      properties:
        version:
          $ref: '#/components/schemas/FlowVersion'
        outcome:
          $ref: '#/components/schemas/ValidationOutcome'

    IvrFlowValidationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlowValidationResult'

    # ── Call Events ───────────────────────────────────────────────────────────

    IvrFlowSimulationRequest:
      type: object
      properties:
        digits:
          type: array
          items:
            type: string
        collected_digits:
          type: object
          additionalProperties:
            type: string
        caller_number:
          type: string
        now:
          type: string
          format: date-time
        force_timeout:
          type: boolean
        force_timeout_nodes:
          type: array
          items:
            type: string
        force_invalid:
          type: boolean
        force_invalid_nodes:
          type: array
          items:
            type: string
        variables:
          type: object
          additionalProperties:
            type: string

    IvrFlowSimulationFinalAction:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [transfer_extension, queue, voicemail, hangup]
        extension_id:
          type: string
          format: uuid
        extension_number:
          type: string
        queue_id:
          type: string
          format: uuid
        voicemail_box_id:
          type: string
          format: uuid

    IvrFlowSimulationOutcome:
      type: object
      required: [status, path, errors]
      properties:
        status:
          type: string
          enum: [passed, failed]
        path:
          type: array
          items:
            type: string
        final_action:
          oneOf:
            - $ref: '#/components/schemas/IvrFlowSimulationFinalAction'
            - type: 'null'
        errors:
          type: array
          items:
            type: object
            additionalProperties: true

    IvrFlowSimulationResult:
      type: object
      required: [version, scenario, outcome]
      properties:
        version:
          $ref: '#/components/schemas/FlowVersion'
        scenario:
          $ref: '#/components/schemas/IvrFlowSimulationRequest'
        outcome:
          $ref: '#/components/schemas/IvrFlowSimulationOutcome'

    IvrFlowSimulationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlowSimulationResult'

    IvrFlowPublishResult:
      type: object
      required: [status, flow]
      properties:
        status:
          type: string
          enum: [published, pending_approval]
        flow:
          $ref: '#/components/schemas/IvrFlow'
        approval_request_id:
          type: string
          format: uuid
          nullable: true

    IvrFlowPublishResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlowPublishResult'

    IvrRuntimeSession:
      type: object
      required: [id, tenant_id, flow_id, flow_version_id, call_id, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        flow_id:
          type: string
          format: uuid
        flow_version_id:
          type: string
          format: uuid
        call_id:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        current_node_id:
          type: string
          nullable: true
        caller_number:
          type: string
          nullable: true
        destination_number:
          type: string
          nullable: true
        last_digits:
          type: string
          nullable: true
        variables_json:
          type: object
          additionalProperties:
            type: string
        last_action_json:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IvrRuntimeAction:
      oneOf:
        - $ref: '#/components/schemas/IvrRuntimePlayPromptAction'
        - $ref: '#/components/schemas/IvrRuntimePlayCollectAction'
        - $ref: '#/components/schemas/IvrRuntimeTransferAction'
        - $ref: '#/components/schemas/IvrRuntimeVoicemailAction'
        - $ref: '#/components/schemas/IvrRuntimeHangupAction'

    IvrRuntimePlayPromptAction:
      type: object
      required: [action, node_id, prompt_id, prompt_uri]
      properties:
        action:
          type: string
          const: play_prompt
        node_id:
          type: string
        prompt_id:
          type: string
          format: uuid
        prompt_uri:
          type: string

    IvrRuntimePlayCollectAction:
      type: object
      required: [action, node_id, prompt_id, prompt_uri, max_digits, timeout_ms, retries]
      properties:
        action:
          type: string
          const: play_collect
        node_id:
          type: string
        prompt_id:
          type: string
          format: uuid
        prompt_uri:
          type: string
        max_digits:
          type: integer
        timeout_ms:
          type: integer
        retries:
          type: integer

    IvrRuntimeTransferAction:
      type: object
      required: [action, node_id, target_type]
      properties:
        action:
          type: string
          const: transfer
        node_id:
          type: string
        target_type:
          type: string
          enum: [extension, queue]
        target:
          type: string
          nullable: true
        domain:
          type: string
          nullable: true
        members:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true

    IvrRuntimeVoicemailAction:
      type: object
      required: [action, node_id, mailbox_number]
      properties:
        action:
          type: string
          const: voicemail
        node_id:
          type: string
        mailbox_number:
          type: string
        greeting_prompt_uri:
          type: string
          nullable: true

    IvrRuntimeHangupAction:
      type: object
      required: [action, node_id]
      properties:
        action:
          type: string
          const: hangup
        node_id:
          type: string

    StartIvrRuntimeSessionRequest:
      type: object
      required: [call_id, flow_id]
      properties:
        call_id:
          type: string
          minLength: 1
          maxLength: 255
        flow_id:
          type: string
          format: uuid
        caller_number:
          type: string
          maxLength: 255
        destination_number:
          type: string
          maxLength: 255
        variables:
          type: object
          additionalProperties:
            type: string
            maxLength: 255

    AdvanceIvrRuntimeSessionRequest:
      type: object
      required: [node_id, outcome]
      properties:
        node_id:
          type: string
          minLength: 1
          maxLength: 255
        outcome:
          type: string
          enum: [completed, digits, timeout, invalid]
        digits:
          type: string
          minLength: 1
          maxLength: 64
        variables:
          type: object
          additionalProperties:
            type: string
            maxLength: 255

    IvrRuntimeSessionResult:
      type: object
      required: [session]
      properties:
        session:
          $ref: '#/components/schemas/IvrRuntimeSession'
        action:
          oneOf:
            - $ref: '#/components/schemas/IvrRuntimeAction'
            - type: 'null'

    IvrRuntimeSessionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrRuntimeSessionResult'

    IvrRuntimeSessionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IvrRuntimeSession'

    IvrRuntimeSessionStep:
      type: object
      required: [id, session_id, step_index, phase, outcome, resulting_status, variables_json, created_at]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        step_index:
          type: integer
        phase:
          type: string
          enum: [start, advance]
        node_id:
          type: string
          nullable: true
        outcome:
          type: string
          enum: [start, completed, digits, timeout, invalid]
        digits:
          type: string
          nullable: true
        action_json:
          type: object
          nullable: true
          additionalProperties: true
        resulting_node_id:
          type: string
          nullable: true
        resulting_status:
          type: string
          enum: [running, completed, failed]
        variables_json:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time

    IvrRuntimeSessionReplay:
      type: object
      required: [session, steps, call_events]
      properties:
        session:
          $ref: '#/components/schemas/IvrRuntimeSession'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/IvrRuntimeSessionStep'
        call_events:
          type: array
          items:
            $ref: '#/components/schemas/CallEvent'

    IvrRuntimeSessionReplayResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrRuntimeSessionReplay'

    CallEvent:
      type: object
      required: [id, tenant_id, call_id, event_type, event_time, payload, ingested_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        call_id:
          type: string
        event_type:
          type: string
        event_time:
          type: string
          format: date-time
        source:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        ingested_at:
          type: string
          format: date-time

    CallEventResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CallEvent'

    CallEventListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CallEvent'

    IngestCallEventRequest:
      type: object
      required: [tenant_id, call_id, event_type]
      properties:
        tenant_id:
          type: string
          format: uuid
        call_id:
          type: string
          minLength: 1
        event_type:
          type: string
          minLength: 1
        event_time:
          type: string
          format: date-time
        source:
          type: string
        payload:
          type: object
          additionalProperties: true

    # ── Platform ──────────────────────────────────────────────────────────────

    TenantSummary:
      type: object
      required: [id, name, slug, directory_domain, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        directory_domain:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TenantSummary'

    ServiceHealth:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        url:
          type: string
          nullable: true
        status:
          type: string
          enum: [healthy, degraded, unreachable]
        detail:
          type: string
          nullable: true

    RuntimeHealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
