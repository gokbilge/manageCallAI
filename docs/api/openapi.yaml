openapi: 3.1.0
info:
  title: manageCallAI API
  version: 0.1.0
  summary: Business-level telecom control plane API over FreeSWITCH
  description: |
    OpenAPI contract for the initial manageCallAI REST API.

    This API exposes business objects and lifecycle operations such as
    validation, simulation, publish, and rollback. It intentionally avoids
    exposing low-level FreeSWITCH control primitives as first-class public API
    operations.
servers:
  - url: https://api.example.com/api/v1
    description: Production placeholder
  - url: http://localhost:3000/api/v1
    description: Local development
tags:
  - name: Extensions
  - name: Trunks
  - name: Numbers
  - name: InboundRoutes
  - name: OutboundRoutes
  - name: Prompts
  - name: Flows
  - name: Validations
  - name: Simulations
  - name: Publishes
  - name: Approvals
  - name: AuditEvents
  - name: CallEvents
  - name: CDRs
security:
  - bearerAuth: []
paths:
  /extensions:
    get:
      tags: [Extensions]
      summary: List extensions
      parameters:
        - $ref: '#/components/parameters/StatusParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Extension collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Extensions]
      summary: Create extension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExtensionRequest'
      responses:
        '201':
          description: Extension created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /extensions/{extensionId}:
    parameters:
      - $ref: '#/components/parameters/ExtensionIdParam'
    get:
      tags: [Extensions]
      summary: Get extension
      responses:
        '200':
          description: Extension
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Extensions]
      summary: Update extension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExtensionRequest'
      responses:
        '200':
          description: Extension updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /extensions/{extensionId}/deactivate:
    parameters:
      - $ref: '#/components/parameters/ExtensionIdParam'
    post:
      tags: [Extensions]
      summary: Deactivate extension
      responses:
        '200':
          description: Extension deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /trunks:
    get:
      tags: [Trunks]
      summary: List trunks
      responses:
        '200':
          description: Trunk collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrunkCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Trunks]
      summary: Create trunk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrunkRequest'
      responses:
        '201':
          description: Trunk created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trunk'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /trunks/{trunkId}:
    parameters:
      - $ref: '#/components/parameters/TrunkIdParam'
    get:
      tags: [Trunks]
      summary: Get trunk
      responses:
        '200':
          description: Trunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trunk'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Trunks]
      summary: Update trunk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrunkRequest'
      responses:
        '200':
          description: Trunk updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trunk'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /numbers:
    get:
      tags: [Numbers]
      summary: List numbers
      responses:
        '200':
          description: Number collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Numbers]
      summary: Create number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePhoneNumberRequest'
      responses:
        '201':
          description: Number created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumber'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /numbers/{numberId}:
    parameters:
      - $ref: '#/components/parameters/NumberIdParam'
    get:
      tags: [Numbers]
      summary: Get number
      responses:
        '200':
          description: Number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumber'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Numbers]
      summary: Update number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhoneNumberRequest'
      responses:
        '200':
          description: Number updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumber'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /inbound-routes:
    get:
      tags: [InboundRoutes]
      summary: List inbound routes
      responses:
        '200':
          description: Inbound route collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [InboundRoutes]
      summary: Create inbound route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInboundRouteRequest'
      responses:
        '201':
          description: Inbound route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /inbound-routes/{routeId}:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    get:
      tags: [InboundRoutes]
      summary: Get inbound route
      responses:
        '200':
          description: Inbound route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [InboundRoutes]
      summary: Update inbound route draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInboundRouteRequest'
      responses:
        '200':
          description: Inbound route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /inbound-routes/{routeId}/validate:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [InboundRoutes, Validations]
      summary: Validate inbound route
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /inbound-routes/{routeId}/publish:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [InboundRoutes, Publishes]
      summary: Publish inbound route
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Publish record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /inbound-routes/{routeId}/rollback:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [InboundRoutes, Publishes]
      summary: Roll back inbound route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        '200':
          description: Rollback record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /outbound-routes:
    get:
      tags: [OutboundRoutes]
      summary: List outbound routes
      responses:
        '200':
          description: Outbound route collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRouteCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [OutboundRoutes]
      summary: Create outbound route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOutboundRouteRequest'
      responses:
        '201':
          description: Outbound route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /outbound-routes/{routeId}:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    get:
      tags: [OutboundRoutes]
      summary: Get outbound route
      responses:
        '200':
          description: Outbound route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [OutboundRoutes]
      summary: Update outbound route draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOutboundRouteRequest'
      responses:
        '200':
          description: Outbound route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundRoute'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /outbound-routes/{routeId}/validate:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [OutboundRoutes, Validations]
      summary: Validate outbound route
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /outbound-routes/{routeId}/publish:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [OutboundRoutes, Publishes]
      summary: Publish outbound route
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Publish record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /prompts:
    get:
      tags: [Prompts]
      summary: List prompts
      responses:
        '200':
          description: Prompt collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Prompts]
      summary: Create prompt metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /prompts/{promptId}:
    parameters:
      - $ref: '#/components/parameters/PromptIdParam'
    get:
      tags: [Prompts]
      summary: Get prompt
      responses:
        '200':
          description: Prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Prompts]
      summary: Update prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptRequest'
      responses:
        '200':
          description: Prompt updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows:
    get:
      tags: [Flows]
      summary: List flows
      parameters:
        - $ref: '#/components/parameters/StatusParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Flow collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Flows]
      summary: Create flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFlowRequest'
      responses:
        '201':
          description: Flow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    get:
      tags: [Flows]
      summary: Get flow
      responses:
        '200':
          description: Flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Flows]
      summary: Update flow draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFlowRequest'
      responses:
        '200':
          description: Flow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/versions:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    get:
      tags: [Flows]
      summary: List flow versions
      responses:
        '200':
          description: Flow version collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersionCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/versions/{versionId}:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    get:
      tags: [Flows]
      summary: Get flow version
      responses:
        '200':
          description: Flow version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersion'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/validate:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [Flows, Validations]
      summary: Validate flow
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/simulate:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [Flows, Simulations]
      summary: Simulate flow
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateFlowRequest'
      responses:
        '200':
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/publish:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [Flows, Publishes]
      summary: Publish flow
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '200':
          description: Publish record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /flows/{flowId}/rollback:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [Flows, Publishes]
      summary: Roll back flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        '200':
          description: Rollback record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /validations:
    get:
      tags: [Validations]
      summary: List validation results
      parameters:
        - $ref: '#/components/parameters/ObjectTypeParam'
        - $ref: '#/components/parameters/ObjectIdParam'
        - $ref: '#/components/parameters/VersionQueryParam'
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Validation result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /validations/{validationId}:
    parameters:
      - $ref: '#/components/parameters/ValidationIdParam'
    get:
      tags: [Validations]
      summary: Get validation result
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /simulations:
    get:
      tags: [Simulations]
      summary: List simulation results
      parameters:
        - $ref: '#/components/parameters/ObjectTypeParam'
        - $ref: '#/components/parameters/ObjectIdParam'
        - $ref: '#/components/parameters/VersionQueryParam'
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Simulation result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResultCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /simulations/{simulationId}:
    parameters:
      - $ref: '#/components/parameters/SimulationIdParam'
    get:
      tags: [Simulations]
      summary: Get simulation result
      responses:
        '200':
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResult'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /publishes:
    get:
      tags: [Publishes]
      summary: List publish records
      parameters:
        - $ref: '#/components/parameters/ObjectTypeParam'
        - $ref: '#/components/parameters/ObjectIdParam'
        - name: actionType
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Publish record collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecordCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /publishes/{publishId}:
    parameters:
      - $ref: '#/components/parameters/PublishIdParam'
    get:
      tags: [Publishes]
      summary: Get publish record
      responses:
        '200':
          description: Publish record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /approvals:
    get:
      tags: [Approvals]
      summary: List approval requests
      responses:
        '200':
          description: Approval request collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequestCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Approvals]
      summary: Create approval request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: Approval request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /approvals/{approvalId}/approve:
    parameters:
      - $ref: '#/components/parameters/ApprovalIdParam'
    post:
      tags: [Approvals]
      summary: Approve request
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /approvals/{approvalId}/reject:
    parameters:
      - $ref: '#/components/parameters/ApprovalIdParam'
    post:
      tags: [Approvals]
      summary: Reject request
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Approval request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /audit-events:
    get:
      tags: [AuditEvents]
      summary: List audit events
      parameters:
        - name: actorType
          in: query
          schema:
            type: string
        - name: actorId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/ObjectTypeParam'
        - $ref: '#/components/parameters/ObjectIdParam'
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit event collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /audit-events/{auditEventId}:
    parameters:
      - $ref: '#/components/parameters/AuditEventIdParam'
    get:
      tags: [AuditEvents]
      summary: Get audit event
      responses:
        '200':
          description: Audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /call-events:
    get:
      tags: [CallEvents]
      summary: List call events
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Optional tenant override; must match the tenant in the JWT.
      responses:
        '200':
          description: Call event collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEventListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /call-events/{callEventId}:
    parameters:
      - $ref: '#/components/parameters/CallEventIdParam'
    get:
      tags: [CallEvents]
      summary: Get call event
      responses:
        '200':
          description: Call event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEvent'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /cdrs:
    get:
      tags: [CDRs]
      summary: List call detail records
      parameters:
        - name: callId
          in: query
          schema:
            type: string
        - name: fromNumber
          in: query
          schema:
            type: string
        - name: toNumber
          in: query
          schema:
            type: string
        - name: startFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: startTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CDR collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CDRCollection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /cdrs/{cdrId}:
    parameters:
      - $ref: '#/components/parameters/CDRIdParam'
    get:
      tags: [CDRs]
      summary: Get call detail record
      responses:
        '200':
          description: CDR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallDetailRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    StatusParam:
      name: status
      in: query
      schema:
        type: string
    SearchParam:
      name: search
      in: query
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    ObjectTypeParam:
      name: objectType
      in: query
      schema:
        type: string
    ObjectIdParam:
      name: objectId
      in: query
      schema:
        type: string
    VersionQueryParam:
      name: versionId
      in: query
      schema:
        type: string
    ExtensionIdParam:
      name: extensionId
      in: path
      required: true
      schema:
        type: string
    TrunkIdParam:
      name: trunkId
      in: path
      required: true
      schema:
        type: string
    NumberIdParam:
      name: numberId
      in: path
      required: true
      schema:
        type: string
    RouteIdParam:
      name: routeId
      in: path
      required: true
      schema:
        type: string
    PromptIdParam:
      name: promptId
      in: path
      required: true
      schema:
        type: string
    FlowIdParam:
      name: flowId
      in: path
      required: true
      schema:
        type: string
    VersionIdParam:
      name: versionId
      in: path
      required: true
      schema:
        type: string
    ValidationIdParam:
      name: validationId
      in: path
      required: true
      schema:
        type: string
    SimulationIdParam:
      name: simulationId
      in: path
      required: true
      schema:
        type: string
    PublishIdParam:
      name: publishId
      in: path
      required: true
      schema:
        type: string
    ApprovalIdParam:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
    AuditEventIdParam:
      name: auditEventId
      in: path
      required: true
      schema:
        type: string
    CallEventIdParam:
      name: callEventId
      in: path
      required: true
      schema:
        type: string
    CDRIdParam:
      name: cdrId
      in: path
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    ErrorDetail:
      type: object
      required: [reason]
      properties:
