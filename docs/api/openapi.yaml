info:
  title: manageCallAI API
  version: 0.1.0
  summary: Business-level telecom control plane API over FreeSWITCH
  description: |
    OpenAPI contract for the manageCallAI REST API.

    **MVP response envelope**: all implemented endpoints return `{ "data": ... }` for
    both single-resource and list responses. Pagination will be introduced later
    where required. Error responses return `{ "error": "<CODE>", "message": "<human text>",
    "request_id": "<id>" }` where `error` is a machine-readable RPC code (NOT_FOUND,
    INVALID_ARGUMENT, UNAUTHENTICATED, PERMISSION_DENIED, ALREADY_EXISTS,
    RESOURCE_EXHAUSTED, INTERNAL, UNAVAILABLE).

    **Auth model**:
    - Human-facing endpoints: `Authorization: Bearer <JWT>` (issued by `/auth/login`
      or `/auth/register`). JWT claims include `sub`, `tenant_id`, `email`, `role`.
    - Runtime/internal endpoints: `Authorization: Bearer <RUNTIME_API_TOKEN>` or
      header `x-managecallai-runtime-token: <token>`. These are called by
      FreeSWITCH and the Go ESL agent — not by end users.

    Only implemented endpoints are documented here. Future resources (outbound
    routes, prompts, CDRs, audit events, approvals, simulations) will be added
    when implemented.
