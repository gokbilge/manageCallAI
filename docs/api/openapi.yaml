    RouteLookupResponse:
      type: object
      required: [matched]
      properties:
        matched:
          type: boolean
        route_id:
          type: string
          format: uuid
          description: Present when matched is true
        tenant_id:
          type: string
          format: uuid
          description: Present when matched is true
        target_type:
          type: string
          enum: [extension, flow, call_group, queue, voicemail_box]
          description: Present when matched is true
        target_id:
          type: string
          format: uuid
          nullable: true
          description: Present when matched is true
        target:
          type: object
          nullable: true
          description: >
            Resolved target details. For extension: { extension_number, directory_domain }.
            For flow: { flow_id }. Queue and voicemail targets return backend-resolved
            business-level details. null when target not resolved.
          additionalProperties: true
