          type: string
        reason:
          type: string
    ErrorEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        requestId:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorEnvelope'
    AuthenticationProfile:
      type: object
      additionalProperties: true
    NetworkProfile:
      type: object
      additionalProperties: true
    Extension:
      type: object
      required: [id, extensionNumber, displayName, status, sipUsername]
      properties:
        id:
          type: string
        extensionNumber:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [active, inactive]
        sipUsername:
          type: string
          description: SIP username used for FreeSWITCH registration (defaults to extensionNumber)
        defaultDestinationType:
          type: string
          enum: [flow, extension, user, queue]
        defaultDestinationId:
          type: string
    CreateExtensionRequest:
      type: object
      required: [extensionNumber, displayName, sipPassword]
      properties:
