          enum: [passed, failed, inconclusive]
        result_payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    IvrFlowHistoryEntryPublish:
      type: object
      required: [id, action_type, triggered_by_type, result, created_at]
