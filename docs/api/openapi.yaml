      - $ref: "#/components/parameters/FlowIdParam"
    get:
      tags:
        - IvrFlows
      summary: Get IVR flow with versions
      responses:
        "200":
          description: IVR flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowDetailResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags:
        - IvrFlows
      summary: Update IVR flow metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIvrFlowBody"
      responses:
        "200":
          description: IVR flow updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/versions:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
    get:
      tags:
        - IvrFlows
      summary: List IVR flow versions
      responses:
        "200":
          description: Flow version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersionListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - IvrFlows
      summary: Create draft version
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlowVersionBody"
      responses:
        "201":
          description: Draft version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/versions/{versionId}:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
      - $ref: "#/components/parameters/VersionIdParam"
    get:
      tags:
        - IvrFlows
      summary: Get IVR flow version
      responses:
        "200":
          description: Flow version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    patch:
      tags:
        - IvrFlows
      summary: Update draft version definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlowVersionBody"
      responses:
        "200":
          description: Version definition updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/versions/{versionId}/validate:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
      - $ref: "#/components/parameters/VersionIdParam"
    post:
      tags:
        - IvrFlows
      summary: Validate flow version
      responses:
        "200":
          description: Validation passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowValidationResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowValidationResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/validate:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
    post:
      tags:
        - IvrFlows
      summary: Validate current draft flow version
      responses:
        "200":
          description: Validation passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowValidationResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowValidationResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/simulate:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
    post:
      tags:
        - IvrFlows
      summary: Simulate current draft flow version
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationScenario"
      responses:
        "200":
          description: Simulation passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowSimulationResponse"
        "422":
          description: Simulation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowSimulationResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/versions/{versionId}/simulate:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
      - $ref: "#/components/parameters/VersionIdParam"
    post:
      tags:
        - IvrFlows
      summary: Simulate specific flow version
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationScenario"
      responses:
        "200":
          description: Simulation passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowSimulationResponse"
        "422":
          description: Simulation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowSimulationResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/versions/{versionId}/publish:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
      - $ref: "#/components/parameters/VersionIdParam"
    post:
      tags:
        - IvrFlows
      summary: Publish validated or simulated flow version
      responses:
        "200":
          description: Flow published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowPublishResponse"
        "202":
          description: Publish is pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowPublishResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/rollback:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
    post:
      tags:
        - IvrFlows
      summary: Roll back to previous published version
      responses:
        "200":
          description: Flow rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowPublishResponse"
        "202":
          description: Rollback is pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowPublishResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-flows/{flowId}/history:
    parameters:
      - $ref: "#/components/parameters/FlowIdParam"
    get:
      tags:
        - IvrFlows
      summary: Get IVR flow validation, simulation, publish, and audit history
      responses:
        "200":
          description: IVR flow history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrFlowHistoryResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /runtime/ivr/sessions:
    get:
      tags:
        - Runtime
      summary: List IVR runtime sessions for the authenticated tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - running
              - completed
              - failed
      responses:
        "200":
          description: Runtime session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrRuntimeSessionListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Runtime
      summary: Start an IVR runtime session
      description: |
        Runtime-internal endpoint. Pins the current published flow version and
        resolves the first constrained runtime action.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartIvrRuntimeSessionBody"
      responses:
        "201":
          description: Runtime session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrRuntimeSessionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /runtime/ivr/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionIdParam"
    get:
      tags:
        - Runtime
      summary: Get IVR runtime session replay for the authenticated tenant
      responses:
        "200":
          description: Runtime session replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrRuntimeSessionReplayResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /runtime/ivr/sessions/{sessionId}/advance:
    parameters:
      - $ref: "#/components/parameters/SessionIdParam"
    post:
      tags:
        - Runtime
      summary: Advance an IVR runtime session
      description: |
        Runtime-internal endpoint. Accepts the result of the current action and
        resolves the next constrained runtime action, if any.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceIvrRuntimeSessionBody"
      responses:
        "200":
          description: Runtime session advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrRuntimeSessionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /runtime/ivr-ai/turns:
    post:
      tags:
        - IvrAI
      summary: Create an AI-assisted IVR turn request
      description: |
        Runtime-internal contract for IVR nodes that ask an external AI service to
        answer a caller question, classify intent, or generate a spoken/text response.
        Provider execution is external to the core platform. OpenAI-compatible,
        custom, or tenant-installed providers can implement this contract.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIvrAiTurnBody"
      responses:
        "201":
          description: IVR AI turn request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrAiTurnRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /runtime/ivr-ai/turns/{ivrAiTurnRequestId}:
    get:
      tags:
        - IvrAI
      summary: Get IVR AI turn request status and result
      description: Tenant-facing status read for a pending or completed AI turn.
      parameters:
        - $ref: "#/components/parameters/IvrAiTurnRequestIdParam"
      responses:
        "200":
          description: IVR AI turn request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrAiTurnRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-ai/internal/{ivrAiTurnRequestId}/claim:
    post:
      tags:
        - IvrAI
      summary: Claim an IVR AI turn request for processing
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - $ref: "#/components/parameters/IvrAiTurnRequestIdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimWorkRequestBody"
      responses:
        "200":
          description: IVR AI turn request claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrAiTurnRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /ivr-ai/internal/{ivrAiTurnRequestId}/result:
    post:
      tags:
        - IvrAI
      summary: Submit IVR AI turn result from a trusted processor
      description: |
        Trusted callback for AI-generated caller response, intent classification, or
        selected next action. Public tenant users cannot call this endpoint.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - $ref: "#/components/parameters/IvrAiTurnRequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteIvrAiTurnBody"
      responses:
        "200":
          description: IVR AI turn result accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IvrAiTurnRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /call-events:
    get:
      tags:
        - CallEvents
      summary: List call events for the authenticated tenant
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Must match the tenant_id in the JWT. Ignored if different.
      responses:
        "200":
          description: Call event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallEventListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /call-events/internal/ingest:
    post:
      tags:
        - CallEvents
      summary: Ingest a call event from the runtime agent
      description: |
        **Runtime-internal endpoint.** Called by the Go FreeSWITCH ESL agent.
        Requires runtime token auth, not a user JWT.
        Header: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or: `x-managecallai-runtime-token: <RUNTIME_API_TOKEN>`
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestCallEventBody"
      responses:
        "201":
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallEventResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings:
    get:
      tags:
        - Recordings
      summary: List recordings for the authenticated tenant
      description: |
        Lists tenant-owned call and voicemail recording metadata. Public responses
        intentionally expose storage-safe metadata only; raw storage internals and
        temporary media URLs are not part of this contract.
      parameters:
        - name: call_id
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 255
      responses:
        "200":
          description: Recording list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /webhooks/{webhookId}/delivery-queue:
    get:
      tags:
        - Webhooks
      summary: List durable delivery queue entries for a webhook
      description: |
        Tenant-scoped operational view of pending, processing, delivered, failed,
        and abandoned webhook deliveries.
      parameters:
        - $ref: "#/components/parameters/WebhookIdParam"
      responses:
        "200":
          description: Webhook delivery queue entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryQueueListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings/{recordingId}:
    get:
      tags:
        - Recordings
      summary: Get a recording for the authenticated tenant
      parameters:
        - $ref: "#/components/parameters/RecordingIdParam"
      responses:
        "200":
          description: Recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings/{recordingId}/playback:
    get:
      tags:
        - Recordings
      summary: Stream tenant-owned recording media
      description: |
        Streams recording media only when the resolved file is under the configured
        recording storage root. The endpoint is tenant-scoped and does not expose
        raw filesystem paths in its response.
      parameters:
        - $ref: "#/components/parameters/RecordingIdParam"
      responses:
        "200":
          description: Recording media stream
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings/internal/ingest:
    post:
      tags:
        - Recordings
      summary: Ingest completed recording metadata from the runtime agent
      description: |
        Runtime-internal endpoint used by the FreeSWITCH agent or another trusted
        runtime component after a call recording or voicemail recording is available.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRecordingBody"
      responses:
        "201":
          description: Recording metadata created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings/{recordingId}/analysis-requests:
    get:
      tags:
        - Recordings
      summary: List analysis requests for a recording
      description: |
        Lists transcription and summarization requests for a tenant-owned recording.
        Results may be produced by an external plugin, worker, or AI service.
      parameters:
        - $ref: "#/components/parameters/RecordingIdParam"
      responses:
        "200":
          description: Recording analysis request list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingAnalysisRequestListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - Recordings
      summary: Request transcription and/or summary for a recording
      description: |
        Creates a provider-neutral analysis request for a tenant-owned recording.
        `preferred_provider` is only a hint; implementations may ignore it or route
        it to a user-installed plugin. `whisper` is documented as an example provider
        value, not as a required platform dependency.
      parameters:
        - $ref: "#/components/parameters/RecordingIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordingAnalysisBody"
      responses:
        "201":
          description: Analysis request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingAnalysisRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recordings/{recordingId}/analysis-requests/{analysisRequestId}:
    get:
      tags:
        - Recordings
      summary: Get analysis request status and result
      parameters:
        - $ref: "#/components/parameters/RecordingIdParam"
        - $ref: "#/components/parameters/AnalysisRequestIdParam"
      responses:
        "200":
          description: Recording analysis request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingAnalysisRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recording-analysis/internal/{analysisRequestId}/claim:
    post:
      tags:
        - Recordings
      summary: Claim an analysis request for processing
      description: |
        Trusted processor endpoint. A plugin or service claims a queued request before
        downloading media through its private integration path and producing results.
        The API remains provider-neutral; `provider` may be `whisper`, `external`,
        or another user-configured value.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - $ref: "#/components/parameters/AnalysisRequestIdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimWorkRequestBody"
      responses:
        "200":
          description: Analysis request claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingAnalysisRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /recording-analysis/internal/{analysisRequestId}/result:
    post:
      tags:
        - Recordings
      summary: Submit analysis result from a trusted processor
      description: |
        Trusted processor callback for completed or failed transcription/summary jobs.
        Public tenant users cannot call this endpoint. The result payload stores
        provider metadata only for observability; provider-specific fields must not
        become required business logic.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - $ref: "#/components/parameters/AnalysisRequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteRecordingAnalysisBody"
      responses:
        "200":
          description: Analysis result accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingAnalysisRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/accounts:
    get:
      tags:
        - ChannelAdapters
      summary: List channel adapter accounts
      description: Lists configured WhatsApp, Telegram, Google Meet, or custom channel adapters for the tenant.
      responses:
        "200":
          description: Channel account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAccountListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - ChannelAdapters
      summary: Create channel adapter account
      description: |
        Registers provider metadata and declared capabilities for a channel adapter.
        Provider credentials are write-only and must never be returned by public APIs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelAccountBody"
      responses:
        "201":
          description: Channel account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAccountResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/accounts/{channelAccountId}:
    get:
      tags:
        - ChannelAdapters
      summary: Get channel adapter account
      parameters:
        - $ref: "#/components/parameters/ChannelAccountIdParam"
      responses:
        "200":
          description: Channel account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelAccountResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/messages/outbound:
    post:
      tags:
        - ChannelAdapters
      summary: Queue outbound channel message
      description: |
        Queues a normalized outbound message for an independent channel adapter service.
        WhatsApp template rules, Telegram bot constraints, and provider-specific
        restrictions are adapter concerns represented in provider_metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutboundMessageBody"
      responses:
        "201":
          description: Outbound channel message request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMessageRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/messages/outbound/internal/claim:
    post:
      tags:
        - ChannelAdapters
      summary: Claim queued outbound channel message work
      description: |
        Internal endpoint for independent provider adapter services. The API remains
        the source of truth for queued work; adapters claim one queued request at a
        time and deliver it through their provider-specific service.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimOutboundMessageBody"
      responses:
        "200":
          description: Claimed request, or null when no work is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMessageRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/messages/outbound/{requestId}/internal/result:
    post:
      tags:
        - ChannelAdapters
      summary: Submit outbound channel delivery result
      description: |
        Internal endpoint for independent provider adapter services to mark claimed
        outbound work as sent or failed. Provider payloads stay bounded in
        provider_metadata and are not canonical business state.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOutboundMessageBody"
      responses:
        "200":
          description: Delivery result accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMessageRequestResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/messages/inbound/internal:
    post:
      tags:
        - ChannelAdapters
      summary: Ingest inbound channel message from provider adapter
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestInboundMessageBody"
      responses:
        "201":
          description: Inbound channel message ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMessageResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/voice-sessions:
    post:
      tags:
        - ChannelAdapters
      summary: Create channel voice or meeting session request
      description: |
        Creates a voice-capable interaction through a channel adapter when supported.
        Capability values distinguish async voice messages, native calls, SIP bridges,
        and meeting-style sessions such as Google Meet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingSessionBody"
      responses:
        "202":
          description: Channel voice or meeting session accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelVoiceSessionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /channels/voice-sessions/{channelVoiceSessionId}:
    get:
      tags:
        - ChannelAdapters
      summary: Get channel voice or meeting session status
      parameters:
        - $ref: "#/components/parameters/ChannelVoiceSessionIdParam"
      responses:
        "200":
          description: Channel voice or meeting session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelVoiceSessionResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /platform/tenants:
    get:
      tags:
        - Platform
      summary: List all tenants (platform_admin only)
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /platform/runtime/health:
    get:
