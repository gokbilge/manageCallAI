          type: string
        displayName:
          type: string
        sipUsername:
          type: string
          description: Defaults to extensionNumber when omitted
        sipPassword:
          type: string
          writeOnly: true
          description: >
            Plaintext SIP registration password. Encrypted with AES-256-GCM before storage.
            Never returned in API responses.
          minLength: 8
        defaultDestinationType:
          type: string
        defaultDestinationId:
          type: string
    UpdateExtensionRequest:
