openapi: 3.1.0
info:
  title: manageCallAI API
  version: 0.1.0
  summary: Business-level telecom control plane API over FreeSWITCH
  description: |
    OpenAPI contract for the manageCallAI REST API.

    **MVP response envelope**: all implemented endpoints return `{ "data": ... }` for
    both single-resource and list responses. Pagination will be introduced later
    where required. Error responses return `{ "error": "<message>" }`.

    **Auth model**:
    - Human-facing endpoints: `Authorization: Bearer <JWT>` (issued by `/auth/login`
      or `/auth/register`). JWT claims include `sub`, `tenant_id`, `email`, `role`.
    - Runtime/internal endpoints: `Authorization: Bearer <RUNTIME_API_TOKEN>` or
      header `x-managecallai-runtime-token: <token>`. These are called by
      FreeSWITCH and the Go ESL agent — not by end users.

    Only implemented endpoints are documented here. Future resources (outbound
    routes, prompts, CDRs, audit events, approvals, simulations) will be added
    when implemented.
servers:
  - url: https://api.example.com/api/v1
    description: Production placeholder
  - url: http://localhost:3000/api/v1
    description: Local development
tags:
  - name: Auth
    description: Tenant registration and login
  - name: Extensions
    description: SIP extension management
  - name: SipTrunks
    description: SIP trunk management
  - name: PhoneNumbers
    description: Phone number management
  - name: InboundRoutes
    description: Inbound route lifecycle (draft → validate → publish → rollback)
  - name: IvrFlows
    description: IVR flow lifecycle (draft → validate → publish → rollback)
  - name: CallEvents
    description: Call event query (tenant-facing) and ingestion (runtime-internal)
  - name: Platform
    description: Platform operator endpoints (require platform_admin role)
  - name: FreeSWITCH
    description: Runtime-internal endpoints called by FreeSWITCH and the ESL agent
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register tenant and first user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /extensions:
    get:
      tags: [Extensions]
      summary: List extensions for the authenticated tenant
      responses:
        '200':
          description: Extension list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Extensions]
      summary: Create extension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExtensionRequest'
      responses:
        '201':
          description: Extension created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /extensions/{extensionId}:
    parameters:
      - $ref: '#/components/parameters/ExtensionIdParam'
    get:
      tags: [Extensions]
      summary: Get extension
      responses:
        '200':
          description: Extension
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Extensions]
      summary: Update extension
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExtensionRequest'
      responses:
        '200':
          description: Extension updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /extensions/{extensionId}/deactivate:
    parameters:
      - $ref: '#/components/parameters/ExtensionIdParam'
    post:
      tags: [Extensions]
      summary: Deactivate extension
      responses:
        '200':
          description: Extension deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /sip-trunks:
    get:
      tags: [SipTrunks]
      summary: List SIP trunks
      responses:
        '200':
          description: SIP trunk list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunkListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [SipTrunks]
      summary: Create SIP trunk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSipTrunkRequest'
      responses:
        '201':
          description: SIP trunk created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /sip-trunks/{trunkId}:
    parameters:
      - $ref: '#/components/parameters/TrunkIdParam'
    get:
      tags: [SipTrunks]
      summary: Get SIP trunk
      responses:
        '200':
          description: SIP trunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [SipTrunks]
      summary: Update SIP trunk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSipTrunkRequest'
      responses:
        '200':
          description: SIP trunk updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /sip-trunks/{trunkId}/deactivate:
    parameters:
      - $ref: '#/components/parameters/TrunkIdParam'
    post:
      tags: [SipTrunks]
      summary: Deactivate SIP trunk
      responses:
        '200':
          description: SIP trunk deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SipTrunkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /phone-numbers:
    get:
      tags: [PhoneNumbers]
      summary: List phone numbers
      responses:
        '200':
          description: Phone number list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [PhoneNumbers]
      summary: Create phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePhoneNumberRequest'
      responses:
        '201':
          description: Phone number created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /phone-numbers/{numberId}:
    parameters:
      - $ref: '#/components/parameters/NumberIdParam'
    get:
      tags: [PhoneNumbers]
      summary: Get phone number
      responses:
        '200':
          description: Phone number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [PhoneNumbers]
      summary: Update phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhoneNumberRequest'
      responses:
        '200':
          description: Phone number updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /phone-numbers/{numberId}/deactivate:
    parameters:
      - $ref: '#/components/parameters/NumberIdParam'
    post:
      tags: [PhoneNumbers]
      summary: Deactivate phone number
      responses:
        '200':
          description: Phone number deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes:
    get:
      tags: [InboundRoutes]
      summary: List inbound routes
      responses:
        '200':
          description: Inbound route list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [InboundRoutes]
      summary: Create inbound route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInboundRouteRequest'
      responses:
        '201':
          description: Inbound route created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes/{routeId}:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    get:
      tags: [InboundRoutes]
      summary: Get inbound route with versions
      responses:
        '200':
          description: Inbound route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [InboundRoutes]
      summary: Update inbound route metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInboundRouteRequest'
      responses:
        '200':
          description: Inbound route updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes/{routeId}/versions:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [InboundRoutes]
      summary: Create draft version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [definition]
              properties:
                definition:
                  type: object
      responses:
        '201':
          description: Draft version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteVersionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes/{routeId}/versions/{versionId}/validate:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [InboundRoutes]
      summary: Validate inbound route version
      responses:
        '200':
          description: Validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes/{routeId}/versions/{versionId}/publish:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [InboundRoutes]
      summary: Publish validated version
      responses:
        '200':
          description: Route published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /inbound-routes/{routeId}/rollback:
    parameters:
      - $ref: '#/components/parameters/RouteIdParam'
    post:
      tags: [InboundRoutes]
      summary: Roll back to previous published version
      responses:
        '200':
          description: Route rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundRouteResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows:
    get:
      tags: [IvrFlows]
      summary: List IVR flows
      responses:
        '200':
          description: IVR flow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [IvrFlows]
      summary: Create IVR flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIvrFlowRequest'
      responses:
        '201':
          description: IVR flow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    get:
      tags: [IvrFlows]
      summary: Get IVR flow with versions
      responses:
        '200':
          description: IVR flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [IvrFlows]
      summary: Update IVR flow metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIvrFlowRequest'
      responses:
        '200':
          description: IVR flow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [IvrFlows]
      summary: Create draft version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [definition]
              properties:
                definition:
                  type: object
      responses:
        '201':
          description: Draft version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions/{versionId}:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    patch:
      tags: [IvrFlows]
      summary: Update draft version definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [definition]
              properties:
                definition:
                  type: object
      responses:
        '200':
          description: Version definition updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions/{versionId}/validate:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [IvrFlows]
      summary: Validate flow version
      responses:
        '200':
          description: Validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResultResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/versions/{versionId}/publish:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
      - $ref: '#/components/parameters/VersionIdParam'
    post:
      tags: [IvrFlows]
      summary: Publish validated flow version
      responses:
        '200':
          description: Flow published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /ivr-flows/{flowId}/rollback:
    parameters:
      - $ref: '#/components/parameters/FlowIdParam'
    post:
      tags: [IvrFlows]
      summary: Roll back to previous published version
      responses:
        '200':
          description: Flow rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IvrFlowResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /call-events:
    get:
      tags: [CallEvents]
      summary: List call events for the authenticated tenant
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Must match the tenant_id in the JWT. Ignored if different.
      responses:
        '200':
          description: Call event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEventListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /call-events/internal/ingest:
    post:
      tags: [CallEvents]
      summary: Ingest a call event from the runtime agent
      description: |
        **Runtime-internal endpoint.** Called by the Go FreeSWITCH ESL agent.
        Requires runtime token auth, not a user JWT.
        Header: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or: `x-managecallai-runtime-token: <RUNTIME_API_TOKEN>`
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestCallEventRequest'
      responses:
        '201':
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallEventResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /platform/tenants:
    get:
      tags: [Platform]
      summary: List all tenants (platform_admin only)
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /platform/runtime/health:
    get:
      tags: [Platform]
      summary: Runtime health summary (platform_admin only)
      responses:
        '200':
          description: Runtime health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /freeswitch/directory:
    get:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML directory lookup
      description: |
        **Runtime-internal endpoint.** Called by FreeSWITCH `mod_xml_curl` for
        SIP registration and authentication. Returns FreeSWITCH XML.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or query param `runtime_token=<token>` (local/dev compatibility only).
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: user
          in: query
          schema:
            type: string
          description: SIP username (extension number)
        - name: domain
          in: query
          schema:
            type: string
          description: SIP domain
        - name: runtime_token
          in: query
          schema:
            type: string
          description: Dev-only token fallback. Prefer Authorization header.
      responses:
        '200':
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string
        '404':
          description: User not found — FreeSWITCH XML with empty groups
          content:
            text/xml:
              schema:
                type: string
    post:
      tags: [FreeSWITCH]
      summary: FreeSWITCH XML directory lookup (POST form)
      description: |
        Same as GET /freeswitch/directory but accepts form-encoded body
        as sent by some FreeSWITCH `mod_xml_curl` configurations.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                user:
                  type: string
                domain:
                  type: string
                runtime_token:
                  type: string
      responses:
        '200':
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string

  /freeswitch/route-lookup:
    get:
      tags: [FreeSWITCH]
      summary: Resolve an inbound DID to a route target
      description: |
        **Runtime-internal endpoint.** Called by the FreeSWITCH Lua inbound
        script (`inbound_route.lua`) on every inbound call.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or header `x-managecallai-runtime-token: <token>`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: did
          in: query
          required: true
          schema:
            type: string
          description: E.164 DID to resolve (URL-encoded, e.g. %2B15551234567)
        - name: trunk
          in: query
          schema:
            type: string
          description: Trunk name for trunk-match routing (optional)
      responses:
        '200':
          description: Route resolved or not matched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteLookupResponse'
        '400':
          description: Missing did parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User JWT issued by /auth/login or /auth/register
    runtimeTokenBearer:
      type: http
      scheme: bearer
      description: RUNTIME_API_TOKEN as Bearer token (preferred)
    runtimeTokenHeader:
      type: apiKey
      in: header
      name: x-managecallai-runtime-token
      description: RUNTIME_API_TOKEN as custom header

  parameters:
    ExtensionIdParam:
      name: extensionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TrunkIdParam:
      name: trunkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NumberIdParam:
      name: numberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RouteIdParam:
      name: routeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FlowIdParam:
      name: flowId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionIdParam:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [tenant_name, tenant_slug, email, display_name, password]
      properties:
        tenant_name:
          type: string
          minLength: 1
          maxLength: 100
        tenant_slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
          writeOnly: true

    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug:
          type: string
        email:
          type: string
        password:
          type: string
          writeOnly: true

    AuthResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: >
            Signed JWT. Claims include sub, tenant_id, email, role
            ('tenant_admin' | 'platform_admin').

    # ── Extensions ────────────────────────────────────────────────────────────

    Extension:
      type: object
      required: [id, tenant_id, extension_number, display_name, status, sip_username, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        extension_number:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        sip_username:
          type: string
        default_destination_type:
          type: string
          nullable: true
          enum: [flow, extension, user, queue, null]
        default_destination_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ExtensionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Extension'

    ExtensionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Extension'

    CreateExtensionRequest:
      type: object
      required: [extension_number, display_name, sip_password]
      properties:
        extension_number:
          type: string
          minLength: 1
          maxLength: 20
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        sip_username:
          type: string
          minLength: 1
          maxLength: 64
          description: Defaults to extension_number when omitted
        sip_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
          description: >
            Plaintext SIP password. Encrypted with AES-256-GCM before storage.
            Never returned in any API response.
        default_destination_type:
          type: string
          enum: [flow, extension, user, queue]
        default_destination_id:
          type: string
          format: uuid

    UpdateExtensionRequest:
      type: object
      properties:
        extension_number:
          type: string
          minLength: 1
          maxLength: 20
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          type: string
          enum: [active, inactive]
        sip_username:
          type: string
          minLength: 1
          maxLength: 64
        sip_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
        default_destination_type:
          oneOf:
            - type: string
              enum: [flow, extension, user, queue]
            - type: 'null'
        default_destination_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    # ── SIP Trunks ────────────────────────────────────────────────────────────

    SipTrunk:
      type: object
      required: [id, tenant_id, name, status, direction, realm, proxy, port, transport, auth_username, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          type: string
          nullable: true
        auth_username:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SipTrunkResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SipTrunk'

    SipTrunkListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SipTrunk'

    CreateSipTrunkRequest:
      type: object
      required: [name, direction, realm, proxy, auth_username, auth_password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          type: string
        auth_username:
          type: string
        auth_password:
          type: string
          writeOnly: true
          minLength: 8
          description: >
            Plaintext SIP trunk auth password. Encrypted with AES-256-GCM before
            storage. Never returned in API responses.

    UpdateSipTrunkRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, inactive]
        direction:
          type: string
          enum: [inbound, outbound, bidirectional]
        realm:
          type: string
        proxy:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        transport:
          type: string
          enum: [udp, tcp, tls]
        username:
          oneOf:
            - type: string
            - type: 'null'
        auth_username:
          type: string
        auth_password:
          type: string
          writeOnly: true
          minLength: 8

    # ── Phone Numbers ─────────────────────────────────────────────────────────

    PhoneNumber:
      type: object
      required: [id, tenant_id, e164_number, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        e164_number:
          type: string
          description: E.164-formatted number, e.g. +15551234567
        display_label:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        trunk_id:
          type: string
          nullable: true
          format: uuid
        assigned_target_type:
          type: string
          nullable: true
          enum: [inbound_route, flow, extension, null]
        assigned_target_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PhoneNumberResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PhoneNumber'

    PhoneNumberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumber'

    CreatePhoneNumberRequest:
      type: object
      required: [e164_number]
      properties:
        e164_number:
          type: string
          minLength: 2
          maxLength: 32
        display_label:
          type: string
          minLength: 1
          maxLength: 255
        trunk_id:
          type: string
          format: uuid

    UpdatePhoneNumberRequest:
      type: object
      properties:
        display_label:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 255
            - type: 'null'
        trunk_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        assigned_target_type:
          oneOf:
            - type: string
              enum: [inbound_route, flow, extension]
            - type: 'null'
        assigned_target_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        status:
          type: string
          enum: [active, inactive]

    # ── Inbound Routes ────────────────────────────────────────────────────────

    InboundRoute:
      type: object
      required: [id, tenant_id, name, match_type, match_value, target_type, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
        phone_number_id:
          type: string
          nullable: true
          format: uuid
        target_type:
          type: string
          enum: [flow, extension]
        target_id:
          type: string
          nullable: true
          format: uuid
        status:
          type: string
          enum: [draft, active, inactive]
        draft_version_id:
          type: string
          nullable: true
          format: uuid
        active_version_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InboundRouteResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/InboundRoute'

    InboundRouteListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InboundRoute'

    CreateInboundRouteRequest:
      type: object
      required: [name, match_type, match_value, target_type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
          minLength: 1
          maxLength: 255
        phone_number_id:
          type: string
          format: uuid
          description: >
            Optional. When supplied, match_type must be 'did' and match_value
            is normalized from the linked phone number's e164_number.
        target_type:
          type: string
          enum: [flow, extension]
        target_id:
          type: string
          format: uuid

    UpdateInboundRouteRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        match_type:
          type: string
          enum: [did, trunk, pattern]
        match_value:
          type: string
          minLength: 1
          maxLength: 255
        phone_number_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        target_type:
          type: string
          enum: [flow, extension]
        target_id:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'

    RouteVersion:
      type: object
      required: [id, route_id, version_number, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        route_id:
          type: string
          format: uuid
        version_number:
          type: integer
        state:
          type: string
          enum: [draft, validated, published, superseded, rolled_back]
        definition:
          type: object
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    RouteVersionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/RouteVersion'

    ValidationResult:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [passed, failed]
            errors:
              type: array
              items:
                type: object
                additionalProperties: true
            warnings:
              type: array
              items:
                type: object
                additionalProperties: true

    ValidationResultResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ValidationResult'

    # ── IVR Flows ─────────────────────────────────────────────────────────────

    IvrFlow:
      type: object
      required: [id, tenant_id, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, inactive]
        draft_version_id:
          type: string
          nullable: true
          format: uuid
        active_version_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IvrFlowResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IvrFlow'

    IvrFlowListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IvrFlow'

    CreateIvrFlowRequest:
      type: object
      required: [name, definition]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        definition:
          type: object
          description: Flow definition graph (nodes + edges)

    UpdateIvrFlowRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          oneOf:
            - type: string
              maxLength: 1000
            - type: 'null'

    FlowVersion:
      type: object
      required: [id, flow_id, version_number, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        flow_id:
          type: string
          format: uuid
        version_number:
          type: integer
        state:
          type: string
          enum: [draft, validated, published, superseded, rolled_back]
        definition:
          type: object
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    FlowVersionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/FlowVersion'

    # ── Call Events ───────────────────────────────────────────────────────────

    CallEvent:
      type: object
      required: [id, tenant_id, call_id, event_type, event_time, payload, ingested_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        call_id:
          type: string
        event_type:
          type: string
        event_time:
          type: string
          format: date-time
        source:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        ingested_at:
          type: string
          format: date-time

    CallEventResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CallEvent'

    CallEventListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CallEvent'

    IngestCallEventRequest:
      type: object
      required: [tenant_id, call_id, event_type]
      properties:
        tenant_id:
          type: string
          format: uuid
        call_id:
          type: string
          minLength: 1
        event_type:
          type: string
          minLength: 1
        event_time:
          type: string
          format: date-time
        source:
          type: string
        payload:
          type: object
          additionalProperties: true

    # ── Platform ──────────────────────────────────────────────────────────────

    TenantSummary:
      type: object
      required: [id, name, slug, directory_domain, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        directory_domain:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TenantSummary'

    ServiceHealth:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        url:
          type: string
          nullable: true
        status:
          type: string
          enum: [healthy, degraded, unreachable]
        detail:
          type: string
          nullable: true

    RuntimeHealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [services]
          properties:
            services:
              type: array
              items:
                $ref: '#/components/schemas/ServiceHealth'

    # ── FreeSWITCH runtime ────────────────────────────────────────────────────

    RouteLookupResponse:
      type: object
      required: [matched]
      properties:
        matched:
          type: boolean
        route_id:
          type: string
          format: uuid
          description: Present when matched is true
        tenant_id:
          type: string
          format: uuid
          description: Present when matched is true
        target_type:
          type: string
          enum: [extension, flow]
          description: Present when matched is true
        target_id:
          type: string
          format: uuid
          nullable: true
          description: Present when matched is true
        target:
          type: object
          nullable: true
          description: >
            Resolved target details. For extension: { extension_number, directory_domain }.
            For flow: { flow_id }. null when target not resolved.
          additionalProperties: true
