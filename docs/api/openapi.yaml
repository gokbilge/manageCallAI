      summary: Runtime summary counters (platform_admin only)
      responses:
        "200":
          description: Runtime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformRuntimeSummaryResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /freeswitch/directory:
    get:
      tags:
        - FreeSWITCH
      summary: FreeSWITCH XML directory lookup
      description: |
        **Runtime-internal endpoint.** Called by FreeSWITCH `mod_xml_curl` for
        SIP registration and authentication. Returns FreeSWITCH XML.
        Auth: `Authorization: Basic base64(fs:<RUNTIME_API_TOKEN>)`
        for `mod_xml_curl`, `Authorization: Bearer <RUNTIME_API_TOKEN>`, or
        `x-managecallai-runtime-token: <token>`. Query/body token fallback is
        only available when explicitly enabled for local compatibility.
      security:
        - runtimeTokenBasic: []
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: user
          in: query
          schema:
            type: string
          description: SIP username (extension number)
        - name: domain
          in: query
          schema:
            type: string
          description: SIP domain
      responses:
        "200":
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: User not found — FreeSWITCH XML with empty groups
          content:
            text/xml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - FreeSWITCH
      summary: FreeSWITCH XML directory lookup (POST form)
      description: |
        Same as GET /freeswitch/directory but accepts form-encoded body
        as sent by some FreeSWITCH `mod_xml_curl` configurations.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                user:
                  type: string
                domain:
                  type: string
      responses:
        "200":
          description: FreeSWITCH XML directory response
          content:
            text/xml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ErrorResponse"
  /freeswitch/route-lookup:
    get:
      tags:
        - FreeSWITCH
      summary: Resolve an inbound DID to a route target
      description: |
        **Runtime-internal endpoint.** Called by the FreeSWITCH Lua inbound
        script (`inbound_route.lua`) on every inbound call.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>`
        or header `x-managecallai-runtime-token: <token>`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: did
          in: query
          required: true
          schema:
            type: string
          description: E.164 DID to resolve (URL-encoded, e.g. %2B15551234567)
        - name: trunk
          in: query
          schema:
            type: string
          description: Trunk name for trunk-match routing (optional)
      responses:
        "200":
          description: Route resolved or not matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteLookupResponse"
        "400":
          description: Missing did parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /freeswitch/dialplan:
    get:
      tags:
        - FreeSWITCH
      summary: FreeSWITCH XML dialplan projection for inbound DID routing
      description: |
        **Runtime-internal endpoint.** Called by FreeSWITCH `mod_xml_curl` for
        inbound DID routing. Returns FreeSWITCH XML dialplan for active inbound
        routes that currently resolve to an `extension` target.
        Auth: `Authorization: Bearer <RUNTIME_API_TOKEN>` or
        `x-managecallai-runtime-token: <token>`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      parameters:
        - name: Caller-Destination-Number
          in: query
          schema:
            type: string
          description: Inbound DID in E.164 form
        - name: destination_number
          in: query
          schema:
            type: string
          description: Alternate FreeSWITCH destination field
        - name: domain
          in: query
          schema:
            type: string
          description: Tenant directory domain
        - name: domain_name
          in: query
          schema:
            type: string
          description: Alternate tenant domain field
      responses:
        "200":
          description: FreeSWITCH XML dialplan response
          content:
            text/xml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags:
        - FreeSWITCH
      summary: FreeSWITCH XML dialplan projection (POST form)
      description: |
        Same as GET /freeswitch/dialplan but accepts form-encoded body as sent
        by `mod_xml_curl`.
      security:
        - runtimeTokenHeader: []
        - runtimeTokenBearer: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Caller-Destination-Number:
                  type: string
                destination_number:
                  type: string
                domain:
                  type: string
                domain_name:
                  type: string
      responses:
        "200":
          description: FreeSWITCH XML dialplan response
          content:
            text/xml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User JWT issued by /auth/login or /auth/register
    runtimeTokenBearer:
      type: http
      scheme: bearer
      description: RUNTIME_API_TOKEN as Bearer token (preferred)
    runtimeTokenBasic:
      type: http
      scheme: basic
      description: RUNTIME_API_TOKEN as the Basic Auth password for FreeSWITCH mod_xml_curl
    runtimeTokenHeader:
      type: apiKey
      in: header
      name: x-managecallai-runtime-token
      description: RUNTIME_API_TOKEN as custom header
  parameters:
