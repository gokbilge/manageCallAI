name: Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: managecallai-api
            context: .
            dockerfile: apps/api/Dockerfile
          - image: managecallai-worker
            context: .
            dockerfile: apps/worker/Dockerfile
          - image: managecallai-mcp
            context: .
            dockerfile: apps/mcp/Dockerfile
          - image: managecallai-mcp-server
            context: .
            dockerfile: apps/mcp-server/Dockerfile
          - image: managecallai-freeswitch-agent
            context: .
            dockerfile: apps/freeswitch-agent/Dockerfile
          - image: managecallai-freeswitch
            context: ./freeswitch
            dockerfile: ./freeswitch/docker/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            ${{ steps.dockerhub.outputs.available == 'true' && format('docker.io/gokbilge/{0}', matrix.image) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
