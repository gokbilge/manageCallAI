name: FreeSWITCH Smoke

# Required release/RC runtime smoke gate.
#
# This workflow runs only on a self-hosted runner because a real FreeSWITCH
# smoke needs SIP/media ports, ESL, mod_xml_curl, PostgreSQL, the API, and the
# Go agent. GitHub-hosted runners are covered by deterministic API, XML golden,
# and unit/integration tests in normal CI.
#
# The "Release and RC smoke gate" repository ruleset requires
# the "FreeSWITCH runtime smoke" status check on release/** and rc/**. A
# pending, skipped, or failing check blocks release promotion.
#
# Self-hosted runner requirements:
#   - Labels: [self-hosted, freeswitch]
#   - Docker Engine + Compose plugin
#   - Go toolchain matching go.work
#   - Ports free: 5060/udp, 5080/tcp, 5080/udp, 8021/tcp, 3000/tcp, 5432/tcp

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL for smoke (default http://localhost:3000)
        required: false
        default: http://localhost:3000
  push:
    branches:
      - 'release/**'
      - 'rc/**'
  pull_request:
    branches:
      - 'release/**'
      - 'rc/**'

permissions:
  contents: read

jobs:
  freeswitch-smoke:
    name: FreeSWITCH runtime smoke
    runs-on: [self-hosted, freeswitch]

    env:
      SMOKE_API_URL: ${{ inputs.api_url || 'http://localhost:3000' }}
      PRODUCTION_E2E_ARTIFACT_DIR: artifacts/production-e2e

    steps:
      - name: Confirm smoke gate runner
        run: |
          echo "FreeSWITCH runtime smoke gate — $(hostname)"
          echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
          echo "API URL: ${SMOKE_API_URL}"
          echo "Commit: ${{ github.sha }}"

      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: false

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── Start runtime stack ─────────────────────────────────────────────────
      # The self-hosted runner must have ports 5060/udp, 5061/tcp, 5080/tcp,
      # 5080/udp, 8021/tcp, 3000/tcp, and 5432/tcp free before this step.

      - name: Start runtime stack (postgres + api + freeswitch + agent)
        run: |
          docker compose --profile freeswitch up -d --build 2>&1 | node scripts/redact-logs.mjs
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.SMOKE_JWT_SECRET }}
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          SIP_SECRET_MASTER_KEY: ${{ secrets.SMOKE_SIP_SECRET_MASTER_KEY }}
          SIP_SECRET_KEY_ID: smoke-v1
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}
          ALLOW_RUNTIME_TOKEN_FALLBACK: "false"
          FREESWITCH_TLS_ENABLED: "true"
          FREESWITCH_EXT_SIP_IP: "127.0.0.1"
          FREESWITCH_EXT_RTP_IP: "127.0.0.1"
          FREESWITCH_ANONYMOUS_CALLS: disabled
          FREESWITCH_MOD_XML_RPC: disabled
          FREESWITCH_LOG_LEVEL: warning
          MANAGECALLAI_SMOKE_ECHO_ENABLED: "true"

      - name: Apply migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}

      - name: Wait for API health
        run: |
          echo "Waiting for API at ${SMOKE_API_URL}/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SMOKE_API_URL}/health" || echo "000")
            [ "$STATUS" = "200" ] && { echo "API healthy after ${i} attempts"; exit 0; }
            echo "  attempt ${i}/30 — status ${STATUS}"
            sleep 5
          done
          echo "ERROR: API did not become healthy in time" && exit 1

      # ── DB contracts ────────────────────────────────────────────────────────

      - name: DB contracts and constraints
        run: |
          pnpm db:contracts
          pnpm db:constraints
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}

      # ── FreeSWITCH TLS port readiness ──────────────────────────────────────

      - name: Wait for FreeSWITCH TLS port
        run: |
          echo "Waiting for FreeSWITCH TLS on 127.0.0.1:5061..."
          for i in $(seq 1 20); do
            nc -z 127.0.0.1 5061 2>/dev/null && { echo "TLS port open after ${i}s"; break; }
            echo "  attempt ${i}/20..."
            sleep 2
          done
          nc -z 127.0.0.1 5061 2>/dev/null || echo "WARNING: TLS port 5061 not confirmed open"
          ss -tlnp | grep 5061 || echo "WARNING: ss shows no listener on 5061"
          FS_CONTAINER=$(docker ps --filter "name=freeswitch" --filter "name=managecall" --format "{{.Names}}" | grep -v agent | head -1)
          echo "Container: ${FS_CONTAINER}"
          docker exec "${FS_CONTAINER}" ls /usr/local/freeswitch/certs/ 2>&1 || echo "WARNING: certs dir empty"
          docker exec "${FS_CONTAINER}" grep "internal_ssl_enable\|certs_dir" /usr/local/freeswitch/conf/vars.xml 2>&1 | head -5 || echo "vars.xml check skipped"

      # ── FreeSWITCH profile ──────────────────────────────────────────────────

      - name: FreeSWITCH ESL profile check
        run: |
          set -o pipefail
          node scripts/check-freeswitch-profile.mjs 2>&1 | node scripts/redact-logs.mjs
        env:
          FREESWITCH_ESL_HOST: 127.0.0.1
          FREESWITCH_ESL_PORT: "8021"
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}

      # ── Production runtime E2E ──────────────────────────────────────────────

      - name: Production runtime E2E
        run: |
          set -o pipefail
          pnpm production:e2e 2>&1 | node scripts/redact-logs.mjs
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.SMOKE_JWT_SECRET }}
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          SIP_SECRET_MASTER_KEY: ${{ secrets.SMOKE_SIP_SECRET_MASTER_KEY }}
          SIP_SECRET_KEY_ID: smoke-v1
          API_BASE_URL: ${{ env.SMOKE_API_URL }}
          PRODUCTION_E2E_ARTIFACT_DIR: ${{ env.PRODUCTION_E2E_ARTIFACT_DIR }}

      # ── SIP REGISTER ────────────────────────────────────────────────────────

      - name: SIP REGISTER smoke
        run: |
          set -o pipefail
          if [ -f "${PRODUCTION_E2E_ARTIFACT_DIR}/sip-register.env" ]; then
            set -a
            . "${PRODUCTION_E2E_ARTIFACT_DIR}/sip-register.env"
            set +a
          fi
          node scripts/sip-register-smoke.mjs 2>&1 | node scripts/redact-logs.mjs
        env:
          SIP_HOST: 127.0.0.1
          SIP_PORT: "5080"
          SIP_REGISTRAR_HOST: 127.0.0.1
          SIP_REGISTRAR_PORT: "5060"
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          API_BASE_URL: ${{ env.SMOKE_API_URL }}

      # ── Go agent ESL smoke ──────────────────────────────────────────────────

      - name: Go agent ESL connection smoke
        run: |
          set -o pipefail
          cd apps/freeswitch-agent && go run . --smoke-check 2>&1 | node ../../scripts/redact-logs.mjs
        env:
          FREESWITCH_ESL_HOST: 127.0.0.1
          FREESWITCH_ESL_PORT: "8021"
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}
          MANAGECALLAI_API_BASE_URL: ${{ env.SMOKE_API_URL }}
          MANAGECALLAI_RUNTIME_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}

      # ── Observability query smoke ───────────────────────────────────────────

      - name: Observability query smoke
        run: |
          set -o pipefail
          node scripts/production-runtime-e2e.mjs --check-config 2>&1 | node scripts/redact-logs.mjs
          echo "ok: observability query path verified via E2E evidence"
        env:
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          API_BASE_URL: ${{ env.SMOKE_API_URL }}
          PRODUCTION_E2E_ARTIFACT_DIR: artifacts/production-e2e-check-config

      # ── FreeSWITCH hardening check ──────────────────────────────────────────

      - name: FreeSWITCH hardening check
        run: |
          set -o pipefail
          node scripts/check-freeswitch-hardening.mjs \
            --json-output=artifacts/hardening/freeswitch-hardening-$(date -u +%Y-%m-%dT%H-%M-%SZ).json \
            2>&1 | node scripts/redact-logs.mjs
        env:
          FREESWITCH_ESL_HOST: 127.0.0.1
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}
          FREESWITCH_ANONYMOUS_CALLS: disabled
          FREESWITCH_MOD_XML_RPC: disabled
          FREESWITCH_LOG_LEVEL: warning
          APP_ENV: production
          GITHUB_SHA: ${{ github.sha }}

      # ── SIP TLS / SRTP / NAT smoke ──────────────────────────────────────────

      - name: Export SIP credentials for TLS smoke
        run: |
          if [ -f "${PRODUCTION_E2E_ARTIFACT_DIR}/sip-register.env" ]; then
            cat "${PRODUCTION_E2E_ARTIFACT_DIR}/sip-register.env" >> "${GITHUB_ENV}"
            echo "SIP credentials exported to GITHUB_ENV"
          fi

      - name: SIP TLS / SRTP / NAT smoke
        run: |
          set -o pipefail
          node scripts/sip-tls-srtp-smoke.mjs \
            --evidence-dir=artifacts/sip-tls \
            2>&1 | node scripts/redact-logs.mjs
        env:
          SIP_HOST: 127.0.0.1
          SIP_TLS_PORT: "5061"
          SIP_UDP_PORT: "5080"
          SIP_LOCAL_IP: 127.0.0.1
          FREESWITCH_EXT_SIP_IP: "127.0.0.1"
          FREESWITCH_EXT_RTP_IP: "127.0.0.1"
          APP_ENV: production
          GITHUB_SHA: ${{ github.sha }}

      - name: Validate SIP TLS / SRTP / NAT evidence
        run: |
          EVIDENCE=$(ls artifacts/sip-tls/sip-tls-srtp-nat-evidence-*.json 2>/dev/null | tail -1)
          if [ -z "$EVIDENCE" ]; then echo "ERROR: no SIP TLS evidence found" && exit 1; fi
          node scripts/check-sip-tls-srtp-nat-evidence.mjs --evidence="$EVIDENCE"

      # ── Validate E2E evidence ───────────────────────────────────────────────

      - name: Validate evidence artifact
        run: node scripts/check-runtime-e2e-evidence.mjs --dir="${PRODUCTION_E2E_ARTIFACT_DIR}"

      # ── Upload artifacts ────────────────────────────────────────────────────

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeswitch-smoke-${{ github.run_id }}
          path: |
            artifacts/production-e2e/*.json
            artifacts/hardening/*.json
            artifacts/sip-tls/*.json
            logs/smoke-*.log
          if-no-files-found: warn
          retention-days: 90

      # ── Teardown ────────────────────────────────────────────────────────────

      - name: Tear down runtime stack
        if: always()
        run: docker compose --profile freeswitch down -v 2>&1 | node scripts/redact-logs.mjs
