name: FreeSWITCH Smoke

# Required release/RC runtime smoke gate.
#
# This workflow intentionally runs only on a self-hosted runner because a real
# FreeSWITCH smoke needs SIP/media ports, ESL, mod_xml_curl, PostgreSQL, the API,
# and the Go agent. GitHub-hosted runners remain covered by deterministic API,
# XML golden, and unit/integration tests in normal CI.
#
# Branch protection or repository rulesets for release/** and rc/** must require
# the "FreeSWITCH runtime smoke" status check. If the self-hosted runner is
# unavailable, this check stays pending or fails and release promotion is blocked.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL for smoke
        required: false
        default: http://localhost:3000
  push:
    branches:
      - 'release/**'
      - 'rc/**'
  pull_request:
    branches:
      - 'release/**'
      - 'rc/**'

permissions:
  contents: read

jobs:
  freeswitch-smoke:
    name: FreeSWITCH runtime smoke
    runs-on: [self-hosted, freeswitch]

    env:
      SMOKE_API_URL: ${{ inputs.api_url || 'http://localhost:3000' }}

    steps:
      - name: Confirm release smoke runner
        run: |
          echo "Running required FreeSWITCH smoke gate on $(hostname)"
          echo "API URL: ${SMOKE_API_URL}"

      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}

      - name: API health check
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SMOKE_API_URL}/health")
            [ "$STATUS" = "200" ] && { echo "API healthy"; exit 0; }
            echo "Waiting for API (attempt $i, status $STATUS)..."
            sleep 3
          done
          echo "API did not become healthy in time" && exit 1

      - name: FreeSWITCH directory and dialplan smoke
        run: node scripts/check-freeswitch-profile.mjs
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.SMOKE_JWT_SECRET }}
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          SIP_SECRET_MASTER_KEY: ${{ secrets.SMOKE_SIP_SECRET_MASTER_KEY }}
          SIP_SECRET_KEY_ID: smoke-v1
          FREESWITCH_ESL_HOST: 127.0.0.1
          FREESWITCH_ESL_PORT: 8021
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}
          API_BASE_URL: ${{ env.SMOKE_API_URL }}

      - name: Production runtime E2E
        run: |
          set -o pipefail
          pnpm production:e2e 2>&1 | node scripts/redact-logs.mjs
        env:
          DATABASE_URL: ${{ secrets.SMOKE_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.SMOKE_JWT_SECRET }}
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          SIP_SECRET_MASTER_KEY: ${{ secrets.SMOKE_SIP_SECRET_MASTER_KEY }}
          SIP_SECRET_KEY_ID: smoke-v1
          API_BASE_URL: ${{ env.SMOKE_API_URL }}
          PRODUCTION_E2E_ARTIFACT_DIR: artifacts/production-e2e

      - name: SIP REGISTER smoke
        run: |
          set -o pipefail
          node scripts/sip-register-smoke.mjs 2>&1 | node scripts/redact-logs.mjs
        env:
          API_BASE_URL: ${{ env.SMOKE_API_URL }}
          RUNTIME_API_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}
          SIP_REGISTRAR_HOST: 127.0.0.1
          SIP_REGISTRAR_PORT: 5060

      - name: Go agent ESL connection smoke
        run: cd apps/freeswitch-agent && go run . --smoke-check
        env:
          FREESWITCH_ESL_HOST: 127.0.0.1
          FREESWITCH_ESL_PORT: 8021
          FREESWITCH_ESL_PASSWORD: ${{ secrets.SMOKE_FREESWITCH_ESL_PASSWORD }}
          MANAGECALLAI_API_BASE_URL: ${{ env.SMOKE_API_URL }}
          MANAGECALLAI_RUNTIME_TOKEN: ${{ secrets.SMOKE_RUNTIME_API_TOKEN }}

      - name: Observability query smoke
        run: |
          set -o pipefail
          curl -s -X POST "${SMOKE_API_URL}/api/v1/auth/register" \
            -H 'Content-Type: application/json' \
            -d '{"tenant_name":"Smoke Tenant","tenant_slug":"smoke-obs-tenant","email":"smoke@example.com","display_name":"Smoke","password":"SmokePass123!"}' \
            | node scripts/redact-logs.mjs
          echo "Observability smoke: basic query path complete"

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeswitch-smoke-${{ github.run_id }}
          path: |
            logs/smoke-*.log
            artifacts/production-e2e/*.json
          if-no-files-found: ignore
          retention-days: 30
