name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: managecallai
          POSTGRES_USER: managecallai
          POSTGRES_PASSWORD: managecallai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U managecallai -d managecallai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://managecallai:managecallai@localhost:5432/managecallai
      JWT_SECRET: ci-jwt-secret
      RUNTIME_API_TOKEN: ci-runtime-token
      SIP_SECRET_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SIP_SECRET_KEY_ID: ci-v1
      MANAGECALLAI_TENANT_ID: 00000000-0000-0000-0000-000000000001
      API_BASE_URL: http://localhost:3000
      WORKER_PORT: 3400
      FREESWITCH_ESL_HOST: 127.0.0.1
      FREESWITCH_ESL_PORT: 8021
      FREESWITCH_ESL_PASSWORD: ClueCon
      LOG_LEVEL: info

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U managecallai -d managecallai && exit 0
            sleep 2
          done
          exit 1

      # ── Secret scanning ──────────────────────────────────────────────────────
      - name: Secret scan
        run: node scripts/check-secrets.mjs

      # ── TypeScript build ─────────────────────────────────────────────────────
      - name: TypeScript build
        run: pnpm build

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Dependency vulnerability audit ───────────────────────────────────────
      # Fails on high or critical severity. To add a suppressed exception, document
      # it in docs/security/audit-exceptions.md and run:
      #   pnpm audit --audit-level=high --json > docs/security/audit-results.json
      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

      # ── Migration governance ─────────────────────────────────────────────────
      # Verifies migration filenames, numeric ordering, and that every duplicate
      # prefix is a documented noop shim.  Runs before replay so naming errors
      # are caught immediately without waiting for PostgreSQL.
      - name: Migration order and naming check
        run: pnpm check:migrations

      # ── Migration replay ─────────────────────────────────────────────────────
      # Applies every migration against the fresh CI database to prove that the
      # migration chain is coherent and all SQL is valid.
      - name: Migration syntax check
        run: pnpm db:check

      - name: Apply migrations (full replay)
        run: pnpm db:migrate

      # ── DB contract check ────────────────────────────────────────────────────
      # Verifies that all application-required columns exist after migrations.
      # Fails fast if any column is missing, before tests run against a broken schema.
      - name: DB contract check
        run: pnpm db:contracts

      # ── DB constraint and default check ──────────────────────────────────────
      # Verifies structural invariants beyond column existence: CHECK constraints,
      # column defaults, UNIQUE indexes, immutability rules, and critical FKs.
      - name: DB constraint check
        run: pnpm db:constraints

      # ── OpenAPI ──────────────────────────────────────────────────────────────
      - name: OpenAPI generate and verify
        run: |
          pnpm --filter @managecallai/contracts build
          node scripts/generate-openapi.mjs
          git diff --exit-code docs/api/openapi.yaml || (echo "docs/api/openapi.yaml is stale — run 'node scripts/generate-openapi.mjs' and commit the result" && exit 1)

      - name: OpenAPI coverage check
        run: node scripts/check-openapi-coverage.mjs

      # ── Tests (unit + integration) ───────────────────────────────────────────
      - name: Tests
        run: pnpm test

      # ── Go test ──────────────────────────────────────────────────────────────
      - name: Go test
        run: cd apps/freeswitch-agent && go test ./...

      # ── MCP contract drift check ─────────────────────────────────────────────
      # Verifies MCP tool inputSchemas are generated from and structurally equal
      # to the Zod schemas in packages/contracts.
      - name: MCP contract drift check
        run: node scripts/check-mcp-schemas.mjs

      # ── Webhook payload coverage check ──────────────────────────────────────
      # Verifies every WEBHOOK_EVENTS entry has a typed payload schema in contracts.
      - name: Webhook payload coverage check
        run: node scripts/check-webhook-payloads.mjs

      # ── API key capability alignment check ───────────────────────────────────
      # Verifies API_KEY_CAPABILITIES in contracts matches CAPABILITIES in the API.
      - name: API key capability alignment check
        run: node scripts/check-api-key-capabilities.mjs

      - name: Production readiness manifest check
        run: pnpm check:production-readiness

      # ── IVR simulation regression ────────────────────────────────────────────
      # Runs IVR graph validator and simulation engine unit tests explicitly to
      # ensure call-flow behaviour doesn't regress when node types or graph rules change.
      - name: IVR simulation regression
        run: node scripts/check-ivr-simulation.mjs

      # ── Runtime XML golden-file tests ────────────────────────────────────────
      # The dialplan-builders unit tests in apps/api verify that FreeSWITCH XML
      # responses match expected golden assertions (covered by pnpm test above).
      # This step makes the gate explicit for reviewers.
      - name: Runtime XML golden-file tests (dialplan builders)
        run: |
          pnpm --filter @managecallai/api exec vitest run \
            src/modules/freeswitch/dialplan-builders.test.ts

      # ── FreeSWITCH profile smoke test ────────────────────────────────────────
      # BLOCKER: FreeSWITCH cannot run as a GitHub Actions service container
      # because it requires host network access for SIP/media and non-trivial
      # startup configuration (sofia XML config, mod_xml_curl URL, etc.).
      # The deterministic CI substitute is the dialplan golden-file test above.
      # To run the full ESL smoke test locally: pnpm runtime:up && node scripts/check-freeswitch-profile.mjs
      #
      # Uncomment the step below when a self-hosted runner with FreeSWITCH is available:
      # - name: FreeSWITCH profile smoke test
      #   run: node scripts/check-freeswitch-profile.mjs
      #   env:
      #     FREESWITCH_ESL_HOST: <runner-host>
      #     FREESWITCH_ESL_PASSWORD: ${{ secrets.FREESWITCH_ESL_PASSWORD }}

  # ── Docker image build test ───────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: managecallai-api
            context: .
            dockerfile: apps/api/Dockerfile
          - image: managecallai-worker
            context: .
            dockerfile: apps/worker/Dockerfile
          - image: managecallai-mcp
            context: .
            dockerfile: apps/mcp/Dockerfile
          - image: managecallai-mcp-server
            context: .
            dockerfile: apps/mcp-server/Dockerfile
          - image: managecallai-freeswitch-agent
            context: .
            dockerfile: apps/freeswitch-agent/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
