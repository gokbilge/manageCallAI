name: Bug report
description: Report a reproducible defect in manageCallAI.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible defects. Questions and deployment help should go to Discussions.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps, commands, requests, or UI actions.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.0.0 or commit SHA
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Web admin
        - FreeSWITCH runtime
        - IVR
        - MCP / AI agents
        - n8n / automation
        - Database / migrations
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs with secrets redacted.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: I have removed or redacted secrets, tokens, phone numbers, and customer data.
          required: true
