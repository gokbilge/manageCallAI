apiVersion: v1
kind: Secret
metadata:
  name: {{ include "managecallai.fullname" . }}-secrets
  labels:
    {{- include "managecallai.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  RUNTIME_API_TOKEN: {{ .Values.secrets.runtimeApiToken | quote }}
  SIP_SECRET_MASTER_KEY: {{ .Values.secrets.sipSecretMasterKey | quote }}
  SIP_SECRET_KEY_ID: {{ .Values.secrets.sipSecretKeyId | quote }}
  FREESWITCH_ESL_PASSWORD: {{ .Values.secrets.freeswitchEslPassword | quote }}
  SETUP_ADMIN_PASSWORD: {{ .Values.bootstrap.adminPassword | quote }}
