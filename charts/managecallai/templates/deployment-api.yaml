apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "managecallai.fullname" . }}-api
  labels:
    {{- include "managecallai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "managecallai.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "managecallai.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/managecallai-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "managecallai.fullname" . }}-config
            - secretRef:
                name: {{ include "managecallai.fullname" . }}-secrets
          ports:
            - containerPort: {{ .Values.config.apiPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          {{- if .Values.storage.recordings.enabled }}
          volumeMounts:
            - name: recordings
              mountPath: {{ .Values.config.recordingStorageRoot }}
          {{- end }}
      {{- if .Values.storage.recordings.enabled }}
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: {{ include "managecallai.fullname" . }}-recordings
      {{- end }}
