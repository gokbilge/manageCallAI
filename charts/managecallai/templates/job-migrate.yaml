apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "managecallai.fullname" . }}-migrate
  labels:
    {{- include "managecallai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "managecallai.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.registry }}/managecallai-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "/workspace/db/migrate.mjs"]
          envFrom:
            - configMapRef:
                name: {{ include "managecallai.fullname" . }}-config
            - secretRef:
                name: {{ include "managecallai.fullname" . }}-secrets
