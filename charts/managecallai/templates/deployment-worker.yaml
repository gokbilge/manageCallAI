apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "managecallai.fullname" . }}-worker
  labels:
    {{- include "managecallai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "managecallai.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "managecallai.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}/managecallai-worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "managecallai.fullname" . }}-config
            - secretRef:
                name: {{ include "managecallai.fullname" . }}-secrets
          ports:
            - containerPort: {{ .Values.config.workerPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
