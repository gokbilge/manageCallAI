services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-managecallai}
      POSTGRES_USER: ${POSTGRES_USER:-managecallai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ghcr.io/gokbilge/managecallai-api:${MANAGECALLAI_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-managecallai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-managecallai}
      API_PORT: 3000
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN}
      SIP_SECRET_MASTER_KEY: ${SIP_SECRET_MASTER_KEY}
      SIP_SECRET_KEY_ID: ${SIP_SECRET_KEY_ID:-v1}
      MANAGECALLAI_EDITION: ${MANAGECALLAI_EDITION:-pro}
      MANAGECALLAI_LICENSE_FILE: ${MANAGECALLAI_LICENSE_FILE:-/etc/managecallai/license/license.json}
      MANAGECALLAI_LICENSE_PUBLIC_KEY: ${MANAGECALLAI_LICENSE_PUBLIC_KEY:-/etc/managecallai/license/public.pem}
      MANAGECALLAI_LICENSE_GRACE_DAYS: ${MANAGECALLAI_LICENSE_GRACE_DAYS:-14}
    volumes:
      - ./license:/etc/managecallai/license:ro
      # Future option: mount locally installed private Pro modules here.
      # - ./modules/pro:/opt/managecallai/modules/pro:ro

  worker:
    image: ghcr.io/gokbilge/managecallai-worker:${MANAGECALLAI_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:3000
      WORKER_PORT: ${WORKER_PORT:-3400}
      APP_ENV: ${APP_ENV:-production}
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN}

  freeswitch-agent:
    image: ghcr.io/gokbilge/managecallai-freeswitch-agent:${MANAGECALLAI_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
      - freeswitch
    environment:
      FREESWITCH_ESL_HOST: freeswitch
      FREESWITCH_ESL_PORT: 8021
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD}
      API_BASE_URL: http://api:3000
      RUNTIME_API_TOKEN: ${RUNTIME_API_TOKEN}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: info

  freeswitch:
    image: ghcr.io/gokbilge/managecallai-freeswitch:${MANAGECALLAI_IMAGE_TAG:-latest}
    restart: unless-stopped
    network_mode: host
    depends_on:
      - api
    environment:
      FREESWITCH_EXT_SIP_IP: ${FREESWITCH_EXTERNAL_SIP_IP}
      FREESWITCH_EXT_RTP_IP: ${FREESWITCH_EXTERNAL_RTP_IP}
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD}
      MANAGECALLAI_DIALPLAN_URL: http://127.0.0.1:3000/api/v1/freeswitch/dialplan
      MANAGECALLAI_DIRECTORY_URL: http://127.0.0.1:3000/api/v1/freeswitch/directory
      MANAGECALLAI_CONFIGURATION_URL: http://127.0.0.1:3000/api/v1/freeswitch/configuration
    volumes:
      - recordings:/recordings

volumes:
  postgres_data:
  recordings:
